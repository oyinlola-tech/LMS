<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Verify OTP</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/auth.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
</head>
<body>
  <div class="auth-split">
    <div class="auth-image-panel">
      <img alt="Educational setting" src="https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=800&q=80"/>
      <div class="auth-image-overlay"></div>
      <div class="auth-image-content">
        <h1>Unlock Your Potential</h1>
        <p>Join the world's leading community for professional growth and continuous learning.</p>
      </div>
    </div>
    <div class="auth-form-panel">
      <div class="auth-form-wrapper">
        <div class="auth-mobile-brand">
          <span>LearnBridge</span>
        </div>
        <div class="auth-header auth-header--compact">
          <h2>Verify OTP</h2>
          <p>We've sent a 6-digit code to your email. Enter it below to continue.</p>
        </div>
        <form id="otp-form">
          <div class="otp-inputs">
            <input autofocus class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*"/>
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*"/>
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*"/>
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*"/>
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*"/>
            <input class="otp-input" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*"/>
          </div>
          <div id="otp-error" class="form-error" style="display:none; margin-top: 1rem; margin-bottom: 0.5rem"></div>
          <button class="btn-submit" type="submit" style="margin-top: 1.5rem">Verify &amp; Proceed</button>
        </form>
        <div class="auth-footer" style="margin-top: 1.5rem">
          <p>Didn't receive the code? <button id="resend-btn" class="forgot-link" disabled style="background: none; border: none; cursor: pointer; font-size: inherit">Resend <span id="timer">(0:59)</span></button></p>
        </div>
      </div>
    </div>
  </div>

  <div data-include="auth-modal"></div>

  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/auth/verify-otp.js"></script>
</body>
</html>
