<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Payment Successful</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: var(--surface-container); border-radius: 1.5rem; padding: 3rem; max-width: 420px; width: 90%; text-align: center; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: var(--on-surface-variant); font-size: 0.875rem; margin: 0 0 2rem; }
    .btn { display: inline-block; padding: 0.75rem 2rem; border-radius: 0.75rem; background: var(--primary); color: var(--on-primary); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Payment Successful!</h1>
    <p>You're now enrolled. Start learning right away.</p>
    <a class="btn" href="/dashboard">Go to Dashboard</a>
  </div>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var ref = params.get('reference');
    var courseId = params.get('courseId');
    if (ref && Shared.auth.isLoggedIn()) {
      api.post('/payments/verify', { reference: ref }).catch(function() {});
    }
  </script>
