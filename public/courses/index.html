<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Course Catalog</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; border-bottom: 1px solid var(--outline-variant); background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); padding: 0.75rem 1rem; }
    .header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .header-links { display: flex; align-items: center; gap: 1.5rem; }
    .header-links a { font-size: 0.875rem; font-weight: 500; color: var(--on-surface-variant); text-decoration: none; }
    .header-links a:hover, .header-links a.active { color: var(--primary); }
    main { margin-top: 4rem; }
    .hero { padding: 4rem 1.5rem; text-align: center; max-width: 640px; margin: 0 auto; }
    .hero h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.75rem; }
    .hero p { font-size: 1.125rem; color: var(--on-surface-variant); }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
    .toolbar { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; }
    .search-wrapper { display: flex; align-items: center; gap: 0.5rem; background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 0.75rem; padding: 0.5rem 0.75rem; flex: 1; max-width: 400px; }
    .search-wrapper input { border: none; background: none; outline: none; font-size: 0.875rem; color: var(--on-surface); width: 100%; font-family: inherit; }
    .filter-select { padding: 0.5rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.875rem; font-family: inherit; cursor: pointer; }
    .categories { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .category-chip { padding: 0.375rem 0.875rem; border: 1px solid var(--outline-variant); border-radius: 999px; font-size: 0.8125rem; font-weight: 500; color: var(--on-surface-variant); background: var(--surface-container); cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .category-chip:hover { border-color: var(--primary); color: var(--primary); }
    .category-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; padding-bottom: 4rem; }
    .course-card { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 1rem; overflow: hidden; transition: all 0.2s; cursor: pointer; }
    .course-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
    .course-card-img { height: 150px; background: var(--surface-container-high); display: flex; align-items: center; justify-content: center; color: var(--primary-fixed-dim); font-size: 2.5rem; }
    .course-card-body { padding: 1.25rem; }
    .course-card-body h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.375rem; }
    .course-card-body .instructor { font-size: 0.8125rem; color: var(--on-surface-variant); margin-bottom: 0.75rem; }
    .course-card-body p { font-size: 0.8125rem; color: var(--on-surface-variant); line-height: 1.5; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .course-footer { display: flex; justify-content: space-between; align-items: center; }
    .course-footer .price { font-size: 1.25rem; font-weight: 800; color: var(--primary); }
    .course-footer .price.free { color: #10b981; }
    .course-footer .meta { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--on-surface-variant); }
    .course-footer .meta span { display: flex; align-items: center; gap: 0.25rem; }
    .pagination { display: flex; justify-content: center; gap: 0.5rem; padding-bottom: 4rem; }
    .pagination button { padding: 0.5rem 1rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.875rem; cursor: pointer; font-family: inherit; }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--on-surface-variant); grid-column: 1/-1; }
    footer { border-top: 1px solid var(--outline-variant); padding: 2rem 1.5rem; text-align: center; font-size: 0.8125rem; color: var(--on-surface-variant); }
    @media (max-width: 768px) { .hero h1 { font-size: 1.75rem; } .courses-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="fixed-header">
    <div class="header-inner">
      <a href="/" style="font-size:1.25rem;font-weight:800;text-decoration:none;color:var(--on-surface)">LearnBridge</a>
      <nav class="header-links">
        <a href="/courses" class="active" style="color:var(--primary)">Courses</a>
        <a href="/blog">Blog</a>
        <a href="/mentors">Mentors</a>
        <a href="/about">About</a>
        <a href="/login" class="btn-primary" style="padding:0.5rem 1rem;font-size:0.8125rem;text-decoration:none">Sign In</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="hero">
      <h1>Explore Courses</h1>
      <p>Find the perfect course to advance your skills and career</p>
    </div>
    <div class="container">
      <div class="toolbar">
        <div class="search-wrapper">
          <span class="material-symbols-outlined" style="font-size:1.25rem;color:var(--on-surface-variant)">search</span>
          <input type="text" id="search-input" placeholder="Search courses..." oninput="loadCourses()"/>
        </div>
        <select id="sort-filter" class="filter-select" onchange="loadCourses()">
          <option value="">Sort by</option>
          <option value="popular">Most Popular</option>
          <option value="newest">Newest</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
        </select>
      </div>
      <div class="categories" id="categories">
        <button class="category-chip active" data-category="" onclick="filterCategory(this)">All</button>
      </div>
      <div id="courses-grid" class="courses-grid">
        <div class="empty-state"><span class="material-symbols-outlined" style="font-size:2.5rem;display:block;margin-bottom:0.5rem">school</span><p>Loading courses...</p></div>
      </div>
      <div class="pagination">
        <button id="prev-page" onclick="changePage(-1)" disabled>Previous</button>
        <span id="page-info" style="font-size:0.875rem;color:var(--on-surface-variant)">Page 1</span>
        <button id="next-page" onclick="changePage(1)">Next</button>
      </div>
    </div>
  </main>
  <footer>&copy; 2026 LearnBridge. All rights reserved.</footer>
  <div data-include="auth-modal"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/apis/public.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    (function() {
      var currentPage = 1, pageSize = 9, totalPages = 1, currentCategory = '';
      var $ = function(id) { return document.getElementById(id); };
      function loadCourses() {
        var search = ($('search-input')||{}).value||'';
        var sort = ($('sort-filter')||{}).value||'';
        var path = '/courses/featured?limit='+pageSize+'&page='+currentPage+'&search='+encodeURIComponent(search);
        if (currentCategory) path += '&category='+currentCategory;
        if (sort) path += '&sort='+sort;
        api.get(path).then(function(r) {
          var items = r.data || r.courses || [];
          totalPages = r.totalPages || (r.total ? Math.ceil(r.total/pageSize) : 1);
          var grid = $('courses-grid');
          if (!items.length) { grid.innerHTML = '<div class="empty-state"><span class="material-symbols-outlined" style="font-size:2.5rem;display:block;margin-bottom:0.5rem">search_off</span><p>No courses found</p></div>'; return; }
          grid.innerHTML = items.map(function(c) {
            var price = c.price ? '$'+Number(c.price).toFixed(2) : 'Free';
            var priceClass = c.price ? '' : 'free';
            return '<div class="course-card" onclick="window.location.href=\'/courses/'+c.id+'\'"><div class="course-card-img"><span class="material-symbols-outlined">school</span></div><div class="course-card-body"><h3>'+(c.title||'Untitled')+'</h3><div class="instructor">'+(c.tutor?.fullName||c.instructorName||'LearnBridge')+'</div><p>'+(c.description||'')+'</p><div class="course-footer"><span class="price '+priceClass+'">'+price+'</span><div class="meta"><span><span class="material-symbols-outlined" style="font-size:1rem">schedule</span>'+(c.totalHours||'—')+'h</span><span><span class="material-symbols-outlined" style="font-size:1rem">group</span>'+(c.enrollmentCount||0)+'</span></div></div></div></div>';
          }).join('');
          $('page-info').textContent = 'Page '+currentPage+' of '+totalPages;
          $('prev-page').disabled = currentPage <= 1;
          $('next-page').disabled = currentPage >= totalPages;
        }).catch(function(e) { console.error(e); $('courses-grid').innerHTML = '<div class="empty-state" style="color:var(--error)">Failed to load courses</div>'; });
      }
      window.loadCourses = loadCourses;
      window.changePage = function(d) { currentPage = Math.max(1, Math.min(currentPage+d, totalPages)); loadCourses(); };
      window.filterCategory = function(btn) {
        document.querySelectorAll('.category-chip').forEach(function(c) { c.classList.remove('active'); });
        btn.classList.add('active');
        currentCategory = btn.getAttribute('data-category');
        currentPage = 1;
        loadCourses();
      };
      api.get('/courses/categories').then(function(r) {
        var cats = r.data || r.categories || [];
        var container = document.getElementById('categories');
        cats.forEach(function(c) {
          var btn = document.createElement('button');
          btn.className = 'category-chip';
          btn.setAttribute('data-category', c.id || c.slug || c);
          btn.textContent = c.name || c.title || c;
          btn.onclick = function() { filterCategory(btn); };
          container.appendChild(btn);
        });
      }).catch(function() {});
      document.addEventListener('components-loaded', loadCourses);
    })();
  </script>
</body>
</html>
