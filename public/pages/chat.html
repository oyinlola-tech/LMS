<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Chat</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    .chat-layout { display: grid; grid-template-columns: 360px 1fr; height: calc(100vh - 5rem); border-radius: 1rem; overflow: hidden; border: 1px solid var(--outline-variant); background: #fff; }
    .side-panel { border-right: 1px solid var(--outline-variant); display: flex; flex-direction: column; overflow: hidden; }
    .tab-bar { display: flex; border-bottom: 1px solid var(--outline-variant); flex-shrink: 0; }
    .tab-btn { flex: 1; padding: 0.75rem 0.5rem; text-align: center; font-size: 0.8125rem; font-weight: 600; cursor: pointer; color: var(--on-surface-variant); border-bottom: 2px solid transparent; transition: var(--transition); background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
    .tab-btn:hover { background: var(--surface); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-content { display: none; flex: 1; overflow-y: auto; }
    .tab-content.active { display: block; }
    .search-box { padding: 0.75rem 1rem; border-bottom: 1px solid var(--outline-variant); }
    .search-box input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; outline: none; font-size: 0.8rem; background: var(--surface); }
    .search-box input:focus { border-color: var(--primary); }
    .conversation-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1rem; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--outline-variant); }
    .conversation-item:hover { background: var(--surface); }
    .conversation-item.active { background: var(--primary-fixed); }
    .conversation-item.unread { font-weight: 700; }
    .avatar { width: 2.75rem; height: 2.75rem; border-radius: 50%; background-size: cover; background-position: center; flex-shrink: 0; background-color: var(--surface-container-high); display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; color: var(--primary); overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
    .chat-area { display: flex; flex-direction: column; height: 100%; }
    .chat-header { padding: 0.875rem 1.5rem; border-bottom: 1px solid var(--outline-variant); display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .chat-header .back-btn { display: none; background: none; border: none; cursor: pointer; padding: 0.25rem; border-radius: 0.5rem; font-size: 1.25rem; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { max-width: 80%; padding: 0.625rem 1rem; border-radius: 1rem; line-height: 1.5; position: relative; }
    .msg.sent { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 0.25rem; }
    .msg.received { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 0.25rem; }
    .msg.flagged { border-left: 3px solid var(--error); }
    .msg .msg-time { font-size: 0.65rem; opacity: 0.7; margin-top: 0.25rem; text-align: right; }
    .msg .flagged-badge { font-size: 0.65rem; opacity: 0.8; margin-top: 0.25rem; display: flex; align-items: center; gap: 0.25rem; color: var(--error); }
    .msg.sent .msg-time { color: rgba(255,255,255,0.7); }
    .msg.received .msg-time { color: var(--on-surface-variant); }
    .attachment-preview { margin-top: 0.5rem; border-radius: 0.75rem; overflow: hidden; max-width: 280px; cursor: pointer; }
    .attachment-preview img, .attachment-preview audio { width: 100%; display: block; border-radius: 0.75rem; }
    .attachment-preview .file-card { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: var(--surface-container); border-radius: 0.75rem; }
    .attachment-preview .file-card .icon { font-size: 1.5rem; }
    .chat-input-area { padding: 0.875rem 1.5rem; border-top: 1px solid var(--outline-variant); display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0; }
    .chat-input-row { display: flex; gap: 0.75rem; align-items: flex-end; }
    .chat-input { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--outline-variant); border-radius: 1.5rem; outline: none; font-size: 0.875rem; resize: none; max-height: 120px; font-family: inherit; }
    .chat-input:focus { border-color: var(--primary); }
    .attach-btn, .send-btn { width: 2.75rem; height: 2.75rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0; cursor: pointer; border: none; font-size: 1.25rem; }
    .attach-btn { background: var(--surface); color: var(--on-surface-variant); }
    .send-btn { background: var(--primary); color: #fff; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .file-preview-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; background: var(--surface); border-radius: 0.75rem; font-size: 0.8rem; }
    .file-preview-bar .remove-file { cursor: pointer; color: var(--error); font-size: 1.25rem; line-height: 1; }
    .empty-state { display: flex; align-items: center; justify-content: center; flex-direction: column; height: 100%; color: var(--on-surface-variant); gap: 1rem; padding: 2rem; text-align: center; }
    .empty-state .icon { font-size: 3rem; }
    .chat-type-badge { font-size: 0.65rem; padding: 0.125rem 0.5rem; border-radius: 1rem; background: var(--primary-container); color: var(--on-primary-container); display: inline-block; }
    @media (max-width: 768px) {
      .chat-layout { grid-template-columns: 1fr; }
      .side-panel.mobile-hide { display: none; }
      .chat-area.mobile-hide { display: none; }
      .chat-header .back-btn { display: flex; }
    }
  </style>
</head>
<body>
  <main>
    <div class="container" style="padding-top: 5rem; padding-bottom: 1rem">
      <div class="chat-layout" id="chat-layout">
        <div class="side-panel" id="side-panel">
          <div class="tab-bar" id="tab-bar">
            <button class="tab-btn active" data-tab="messages">Messages</button>
            <button class="tab-btn" data-tab="discussions">Discussions</button>
          </div>
          <div class="search-box">
            <input type="text" id="search-input" placeholder="Search conversations or threads..."/>
          </div>
          <div class="tab-content active" id="tab-messages">
            <div id="threads-container"></div>
          </div>
          <div class="tab-content" id="tab-discussions">
            <div id="discussions-container"></div>
          </div>
        </div>
        <div class="chat-area" id="chat-area">
          <div class="empty-state" id="empty-state">
            <span class="material-symbols-outlined icon">chat</span>
            <p>Select a conversation or discussion</p>
          </div>
          <div id="chat-view" style="display:none;flex-direction:column;height:100%">
            <div class="chat-header" id="chat-header">
              <button class="back-btn material-symbols-outlined" id="back-btn" onclick="closeChatView()">arrow_back</button>
              <div class="avatar" id="chat-avatar"><span id="chat-avatar-initials">?</span></div>
              <div>
                <p class="font-bold text-sm" id="chat-name"></p>
                <p class="text-xs" style="color:var(--on-surface-variant)" id="chat-subtitle"></p>
              </div>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area" id="chat-input-area">
              <div id="file-preview" style="display:none" class="file-preview-bar">
                <span class="material-symbols-outlined" style="font-size:1.25rem">attach_file</span>
                <span id="file-name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                <span class="remove-file material-symbols-outlined" onclick="clearFileAttachment()">close</span>
              </div>
              <div class="chat-input-row">
                <button class="attach-btn material-symbols-outlined" id="attach-btn" onclick="document.getElementById('file-input').click()">attach_file</button>
                <input type="file" id="file-input" style="display:none" onchange="onFileSelected(this)"/>
                <textarea id="message-input" class="chat-input" placeholder="Type a message..." rows="1" oninput="autoResize(this)"></textarea>
                <button class="send-btn material-symbols-outlined" id="send-btn" onclick="sendChatMessage()">send</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/components/dom-utils.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
