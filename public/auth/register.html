<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Create Account</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/auth.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
</head>
<body>
  <div class="auth-split">
    <div class="auth-image-panel">
      <img alt="Educational setting" src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=800&q=80"/>
      <div class="auth-image-overlay"></div>
      <div class="auth-image-content">
        <h1>Empower your professional growth through world-class education.</h1>
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined" style="color: #fff; font-variation-settings: 'FILL' 1">school</span>
          <span style="font-size: 1.5rem; font-weight: 800; color: #fff">LearnBridge</span>
        </div>
      </div>
    </div>
    <div class="auth-form-panel">
      <div class="auth-form-wrapper">
        <div class="auth-mobile-brand">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">school</span>
          <span>LearnBridge</span>
        </div>
        <div class="auth-header">
          <h2>Create an account</h2>
          <p>Join our community and start your learning journey today.</p>
        </div>
        <form id="register-form">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input class="form-input" id="fullName" name="fullName" placeholder="John Doe" type="text" required/>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input class="form-input" id="email" name="email" placeholder="you@example.com" type="email" required/>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input class="form-input input-icon-pw" id="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" type="password" required/>
              <button class="pw-toggle" type="button" data-toggle-pw="password" tabindex="-1">
                <span class="material-symbols-outlined">visibility_off</span>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrapper">
              <input class="form-input input-icon-pw" id="confirmPassword" name="confirmPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" type="password" required/>
              <button class="pw-toggle" type="button" data-toggle-pw="confirmPassword" tabindex="-1">
                <span class="material-symbols-outlined">visibility_off</span>
              </button>
            </div>
          </div>
          <div class="form-group" style="display: flex; align-items: flex-start; gap: 0.75rem; padding-top: 0.5rem">
            <input id="terms" name="terms" type="checkbox" style="width: 1rem; height: 1rem; margin-top: 0.125rem; accent-color: var(--primary)"/>
            <label for="terms" style="font-size: 0.875rem; color: var(--on-surface-variant); cursor: pointer">
              I agree to the <a href="#" style="color: var(--primary); font-weight: 500">Terms and Conditions</a> and <a href="#" style="color: var(--primary); font-weight: 500">Privacy Policy</a>.
            </label>
          </div>
          <div id="form-error" class="form-error" style="display:none; margin-bottom: 1rem"></div>
          <div style="padding-top: 0.5rem">
            <button class="btn-submit" type="submit">Create Account</button>
          </div>
        </form>
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">Or sign up with</span>
          <div class="divider-line"></div>
        </div>
        <div class="social-buttons">
          <button class="btn-social" type="button">
            <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" style="fill:#4285F4"></path>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" style="fill:#34A853"></path>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" style="fill:#FBBC05"></path>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" style="fill:#EA4335"></path>
            </svg>
            Google
          </button>
          <button class="btn-social" type="button">
            <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="color:#333">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"></path>
            </svg>
            GitHub
          </button>
        </div>
        <div class="auth-footer">
          <p>Already have an account? <a href="/login">Log in</a></p>
        </div>
      </div>
    </div>
  </div>

  <div data-include="auth-modal"></div>

  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/auth/password-toggle.js"></script>
  <script src="/js/auth/register.js"></script>
</body>
</html>
