<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Change Password</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/auth.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
</head>
<body>
  <div class="auth-split">
    <div class="auth-image-panel">
      <img alt="Educational setting" src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=800&q=80"/>
      <div class="auth-image-overlay"></div>
      <div class="auth-image-content">
        <h1>Almost there!</h1>
        <p>Choose a strong password you haven't used before.</p>
      </div>
    </div>
    <div class="auth-form-panel">
      <div class="auth-form-wrapper">
        <div class="auth-mobile-brand">
          <span>LearnBridge</span>
        </div>
        <div class="auth-header">
          <h2>Change password</h2>
          <p>Your new password must be at least 8 characters.</p>
        </div>
        <form id="change-password-form">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined">lock</span>
              <input class="form-input input-icon input-icon-pw" id="newPassword" name="newPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" type="password" required/>
              <button class="pw-toggle" type="button" data-toggle-pw="newPassword" tabindex="-1">
                <span class="material-symbols-outlined">visibility_off</span>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined">lock</span>
              <input class="form-input input-icon input-icon-pw" id="confirmPassword" name="confirmPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" type="password" required/>
              <button class="pw-toggle" type="button" data-toggle-pw="confirmPassword" tabindex="-1">
                <span class="material-symbols-outlined">visibility_off</span>
              </button>
            </div>
          </div>
          <div id="form-error" class="form-error" style="display:none; margin-bottom: 1rem"></div>
          <button class="btn-submit" type="submit">Reset Password</button>
        </form>
        <div class="auth-footer">
          <p><a href="/login">Back to login</a></p>
        </div>
      </div>
    </div>
  </div>

  <div data-include="auth-modal"></div>

  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/auth/password-toggle.js"></script>
</body>
</html>
