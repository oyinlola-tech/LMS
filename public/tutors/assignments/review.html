<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Assignment Review</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <link href="/tutors/assignments/css/review.css" rel="stylesheet"/>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/tutors/components/assignment-sidebar"></div>

    <main class="admin-main">
      <div data-include="/tutors/components/assignment-header"></div>

      <div class="review-container">
        <div class="container">
          <div class="loading-state" id="loading-state">
            <div class="skeleton" style="height:2rem;width:40%;margin-bottom:1rem"></div>
            <div class="skeleton" style="height:12rem;border-radius:0.75rem"></div>
          </div>

          <div class="error-state" id="error-state" style="display:none">
            <div class="text-center" style="padding:4rem 0">
              <span class="material-symbols-outlined" style="font-size:4rem;color:var(--error);margin-bottom:1rem">error</span>
              <h2 class="text-2xl font-bold mb-2">Review Not Found</h2>
              <p style="color:var(--on-surface-variant)" class="mb-6">Unable to load submission review.</p>
              <a href="/tutor/assignments" class="btn-primary">Back to Assignments</a>
            </div>
          </div>

          <div id="review-content" style="display:none">
            <div class="breadcrumb" id="breadcrumb"></div>
            <h1 class="page-title">Submission Review</h1>

            <div class="review-grid">
              <div class="review-main">
                <section class="review-card" id="grade-card" style="display:none">
                  <h2 class="card-title"><span class="material-symbols-outlined">grading</span> Grade</h2>
                  <div class="grade-display" id="grade-display"></div>
                </section>

                <section class="review-card" id="rubric-card" style="display:none">
                  <h2 class="card-title"><span class="material-symbols-outlined">checklist</span> Rubric Breakdown</h2>
                  <table class="rubric-table" id="rubric-table"></table>
                </section>

                <section class="review-card" id="submitted-files-card">
                  <h2 class="card-title"><span class="material-symbols-outlined">folder</span> Submitted Files</h2>
                  <div class="submitted-files" id="submitted-files"></div>
                </section>

                <section class="review-card" id="feedback-card" style="display:none">
                  <h2 class="card-title"><span class="material-symbols-outlined">feedback</span> Instructor Feedback</h2>
                  <div class="feedback-content" id="feedback-content"></div>
                </section>

                <section class="review-card" id="resubmit-card" style="display:none">
                  <h2 class="card-title"><span class="material-symbols-outlined">refresh</span> Resubmit</h2>
                  <p class="text-sm" style="color:var(--on-surface-variant);margin-bottom:1rem">You are allowed to resubmit this assignment.</p>
                  <button class="btn-primary" id="resubmit-btn">
                    <span class="material-symbols-outlined">upload</span> Resubmit
                  </button>
                </section>
              </div>

              <div class="review-sidebar">
                <div class="info-card">
                  <h3>Submission Timeline</h3>
                  <div class="timeline" id="timeline"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div data-include="/tutors/components/assignment-bottom-nav"></div>
  <div data-include="auth-modal"></div>

  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script src="/tutors/assignments/js/review.js"></script>
</body>
</html>
