<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Blog</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
</head>
<body>
  <div data-include="header"></div>
  <main style="padding-top: 6rem">
    <section style="padding: 4rem 0">
      <div class="container" style="max-width: 48rem">
        <h1 class="text-4xl font-black mb-6">LearnBridge Blog</h1>
        <p class="text-lg mb-8" style="color: var(--on-surface-variant)">Insights, tutorials, and stories from our community of learners and instructors.</p>
        <div id="blog-list" class="space-y-6">
          <div class="p-8 text-center" style="color: var(--on-surface-variant)">Loading posts...</div>
        </div>
      </div>
    </section>
  </main>
  <div data-include="footer"></div>
  <div data-include="auth-modal"></div>
<script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/apis/blog.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    document.addEventListener('components-loaded', async () => {
      const el = document.getElementById('blog-list');
      try {
        const { data: posts } = await BlogAPI.list();
        if (!posts || !posts.length) {
          el.innerHTML = '<div class="p-8 text-center" style="color: var(--on-surface-variant)">No posts yet. Check back soon!</div>';
          return;
        }
        el.innerHTML = posts.map(p => {
          const date = p.publishedAt ? new Date(p.publishedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
          const name = p.author ? p.author.fullName || 'Author' : 'LearnBridge';
          return `<article class="p-6 rounded-2xl border" style="background: #fff; border-color: var(--outline-variant)">
            <p class="text-xs font-bold uppercase tracking-widest" style="color: var(--primary)">${date}</p>
            <h3 class="text-xl font-bold mt-1 mb-2"><a href="/blog/${p.slug}" style="text-decoration: none; color: inherit">${p.title}</a></h3>
            <p class="text-sm mb-2" style="color: var(--on-surface-variant)">${p.excerpt || (p.content ? p.content.slice(0, 200) : '')}</p>
            <p class="text-xs" style="color: var(--on-surface-variant)">By ${name}</p>
          </article>`;
        }).join('');
      } catch {
        el.innerHTML = '<div class="p-8 text-center" style="color: var(--error)">Failed to load blog posts.</div>';
      }
    });
  </script>
</body>
</html>
