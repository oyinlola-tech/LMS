<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - All Users</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    .toolbar { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .search-wrapper { display: flex; align-items: center; gap: 0.5rem; background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 0.75rem; padding: 0.5rem 0.75rem; flex: 1; min-width: 200px; max-width: 400px; }
    .search-wrapper input { border: none; background: none; outline: none; font-size: 0.875rem; color: var(--on-surface); width: 100%; font-family: inherit; }
    .filter-select { padding: 0.5rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.875rem; font-family: inherit; cursor: pointer; }
    .table-container { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 1rem; overflow: hidden; }
    .table-container table { width: 100%; border-collapse: collapse; }
    .table-container th { text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--on-surface-variant); border-bottom: 1px solid var(--outline-variant); background: var(--surface-container-high); }
    .table-container td { padding: 0.75rem 1rem; font-size: 0.875rem; border-bottom: 1px solid var(--outline-variant); }
    .table-container tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .badge.active { background: #d1fae5; color: #065f46; }
    .badge.inactive { background: var(--surface-container-high); color: var(--on-surface-variant); }
    .badge.suspended { background: var(--error-container); color: var(--on-error-container); }
    .badge.learner { background: var(--primary-fixed); color: var(--on-primary-fixed); }
    .badge.tutor { background: #fef3c7; color: #92400e; }
    .badge.admin { background: #ede9fe; color: #5b21b6; }
    .badge.super_admin { background: #fce7f3; color: #9d174d; }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; padding: 1rem; }
    .pagination button { padding: 0.375rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.5rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.8125rem; cursor: pointer; font-family: inherit; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--on-surface-variant); }
    @media (max-width: 768px) { .admin-main { padding: 1rem; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <main class="admin-main">
      <div class="page-header">
        <h1>Users</h1>
        <div style="display:flex;align-items:center;gap:1rem">
          <span id="sa-user-name" style="font-weight:600;font-size:0.875rem">Admin</span>
          <button id="sa-logout-btn" class="dash-icon-btn" title="Logout" style="background:none;border:none;color:var(--on-surface-variant);cursor:pointer"><span class="material-symbols-outlined">logout</span></button>
        </div>
      </div>
      <div class="toolbar">
        <div class="search-wrapper">
          <span class="material-symbols-outlined" style="font-size:1.25rem;color:var(--on-surface-variant)">search</span>
          <input type="text" id="search-input" placeholder="Search by name or email..." oninput="loadUsers()"/>
        </div>
        <select id="role-filter" class="filter-select" onchange="loadUsers()">
          <option value="">All Roles</option>
          <option value="learner">Learner</option>
          <option value="tutor">Tutor</option>
          <option value="admin">Admin</option>
          <option value="super_admin">Super Admin</option>
        </select>
        <select id="status-filter" class="filter-select" onchange="loadUsers()">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="suspended">Suspended</option>
        </select>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Email</th><th>Student ID</th><th>Role</th><th>Status</th><th>Joined</th><th></th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--on-surface-variant)">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <button id="prev-page" onclick="changePage(-1)" disabled>Previous</button>
        <span id="page-info" style="font-size:0.8125rem;color:var(--on-surface-variant)">Page 1</span>
        <button id="next-page" onclick="changePage(1)">Next</button>
      </div>
    </main>
  </div>
  <div data-include="/superadmin/components/superadmin-bottom-nav"></div>
  <div data-include="auth-modal"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    (function() {
      var token = localStorage.getItem('token');
      if (!token) { window.location.href = '/login'; return; }
      var currentPage = 1, pageSize = 20, totalPages = 1;
      var $ = function(id) { return document.getElementById(id); };
      window.loadUsers = function() {
        var search = ($('search-input') || {}).value || '';
        var role = ($('role-filter') || {}).value || '';
        var status = ($('status-filter') || {}).value || '';
        api.get('/admin/users?limit=' + pageSize + '&page=' + currentPage + '&search=' + encodeURIComponent(search) + '&role=' + role + '&status=' + status)
          .then(function(res) {
            var data = res.data || {};
            var items = data.items || data.users || [];
            totalPages = data.totalPages || data.total ? Math.ceil(data.total / pageSize) : 1;
            var tbody = $('users-tbody');
            if (!items.length) {
              tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--on-surface-variant)">No users found</td></tr>';
            } else {
              tbody.innerHTML = items.map(function(u) {
                var statusBadge = 'badge ' + (u.status === 'active' ? 'active' : u.status === 'suspended' ? 'suspended' : 'inactive');
                var roleBadge = 'badge ' + (u.role || 'learner');
                return '<tr><td><span style="font-weight:600">' + (u.fullName || '—') + '</span></td><td>' + (u.email || '—') + '</td><td style="font-size:0.8125rem;color:var(--on-surface-variant)">' + (u.studentId || '—') + '</td><td><span class="' + roleBadge + '">' + (u.role || 'learner') + '</span></td><td><span class="' + statusBadge + '">' + (u.status || 'inactive') + '</span></td><td style="font-size:0.8125rem;color:var(--on-surface-variant)">' + (u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—') + '</td><td><button class="btn-icon" onclick="alert(\'View user: ' + u.id + '\')"><span class="material-symbols-outlined">chevron_right</span></button></td></tr>';
              }).join('');
            }
            $('page-info').textContent = 'Page ' + currentPage + ' of ' + totalPages;
            $('prev-page').disabled = currentPage <= 1;
            $('next-page').disabled = currentPage >= totalPages;
          })
          .catch(function(err) { console.error(err); $('users-tbody').innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--error);padding:2rem">Failed to load users</td></tr>'; });
      };
      window.changePage = function(delta) { currentPage = Math.max(1, Math.min(currentPage + delta, totalPages)); loadUsers(); };
      $('sa-logout-btn').addEventListener('click', function() { localStorage.removeItem('token'); window.location.href = '/'; });
      document.addEventListener('components-loaded', loadUsers);
    })();
  </script>
</body>
</html>
