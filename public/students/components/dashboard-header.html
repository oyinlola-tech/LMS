<header class="dash-header">
  <div class="dash-header-left">
    <div class="dash-search">
      <span class="material-symbols-outlined" style="font-size:1.25rem;color:var(--on-surface-variant)">search</span>
      <input type="text" id="dash-search-input" placeholder="Search courses, mentors, resources..." autocomplete="off"/>
    </div>
    <nav class="dash-header-nav">
      <a href="/courses">Courses</a>
      <a href="/mentorship">Mentorship</a>
      <a href="/resources">Resources</a>
    </nav>
  </div>
  <div class="dash-header-right">
    <button id="notif-toggle-btn" class="dash-icon-btn" title="Notifications">
      <span class="material-symbols-outlined">notifications</span>
      <span id="notif-badge" class="notif-badge" style="display:none">0</span>
    </button>
    <div id="notif-dropdown" class="notif-dropdown" style="display:none">
      <div class="notif-dropdown-header">
        <span class="font-bold">Notifications</span>
        <button id="mark-all-read-btn" class="text-xs" style="color:var(--primary);background:none;border:none;cursor:pointer">Mark all read</button>
      </div>
      <div id="notif-dropdown-list" class="notif-dropdown-list">
        <div class="notif-dropdown-empty">Loading...</div>
      </div>
    </div>
    <div class="dash-user-info">
      <span id="dash-user-name" style="font-weight:600;font-size:0.875rem">Learner</span>
      <a href="/profile" class="dash-avatar-link">
        <div id="dash-user-avatar" class="dash-avatar" style="background-image:url(/img/placeholder.svg)"></div>
      </a>
      <button id="dash-logout-btn" class="dash-icon-btn" title="Logout">
        <span class="material-symbols-outlined">logout</span>
      </button>
    </div>
  </div>
</header>
