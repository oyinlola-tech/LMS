<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Submit Assignment</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <link href="/tutors/assignments/css/submission.css" rel="stylesheet"/>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/tutors/components/assignment-sidebar"></div>

    <main class="admin-main">
      <div data-include="/tutors/components/assignment-header"></div>

      <div class="submission-container">
        <div class="container">
          <div class="loading-state" id="loading-state">
            <div class="skeleton" style="height:2rem;width:40%;margin-bottom:1rem"></div>
            <div class="skeleton" style="height:12rem;border-radius:0.75rem"></div>
          </div>

          <div class="error-state" id="error-state" style="display:none">
            <div class="text-center" style="padding:4rem 0">
              <span class="material-symbols-outlined" style="font-size:4rem;color:var(--error);margin-bottom:1rem">error</span>
              <h2 class="text-2xl font-bold mb-2">Submission Error</h2>
              <p style="color:var(--on-surface-variant)" class="mb-6">Unable to load submission data.</p>
              <a href="/tutor/assignments" class="btn-primary">Back to Assignments</a>
            </div>
          </div>

          <div id="submission-content" style="display:none">
            <div class="breadcrumb" id="breadcrumb"></div>
            <h1 class="page-title">Submit Assignment</h1>

            <div class="submission-grid">
              <div class="submission-main">
                <div class="dropzone" id="dropzone">
                  <div class="dropzone-content">
                    <span class="material-symbols-outlined dropzone-icon">cloud_upload</span>
                    <p class="dropzone-text">Drag & drop files here or <strong>browse</strong></p>
                    <p class="dropzone-hint" id="dropzone-hint"></p>
                  </div>
                  <input type="file" id="file-input" class="file-input" multiple hidden/>
                </div>

                <div class="uploaded-files" id="uploaded-files" style="display:none">
                  <h3>Uploaded Files</h3>
                  <div class="files-list" id="files-list"></div>
                  <div class="upload-progress" id="upload-progress" style="display:none">
                    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
                    <span class="progress-text" id="progress-text">0%</span>
                  </div>
                </div>

                <div class="notes-section">
                  <h3>Submission Notes</h3>
                  <textarea id="submission-notes" class="notes-input" placeholder="Add any notes or comments about your submission..." rows="4"></textarea>
                </div>

                <div class="submission-actions">
                  <button class="btn-primary submit-btn" id="submit-btn">
                    <span class="material-symbols-outlined">send</span> Submit Assignment
                  </button>
                  <button class="btn-secondary" id="save-draft-btn">
                    <span class="material-symbols-outlined">save</span> Save Draft
                  </button>
                </div>
              </div>

              <div class="submission-sidebar">
                <div class="info-card">
                  <h3>Assignment Info</h3>
                  <div class="info-rows" id="info-rows"></div>
                </div>
                <div class="info-card">
                  <h3>Requirements</h3>
                  <div class="requirements-content" id="requirements-content"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div data-include="/tutors/components/assignment-bottom-nav"></div>
  <div data-include="auth-modal"></div>

  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script src="/tutors/assignments/js/submission.js"></script>
</body>
</html>
