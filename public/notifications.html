<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Notifications</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .layout { display: flex; min-height: 100vh; }
    .main { flex: 1; padding: 2rem; max-width: 800px; margin: 0 auto; width: 100%; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.5rem; margin: 0; }
    .notif-item { display: flex; gap: 1rem; padding: 1rem; border-radius: 0.75rem; background: var(--surface-container); margin-bottom: 0.5rem; cursor: pointer; transition: var(--transition); }
    .notif-item:hover { background: var(--surface-variant); }
    .notif-item.unread { border-left: 3px solid var(--primary); }
    .notif-item .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; margin-top: 0.375rem; }
    .notif-item .dot.read { background: transparent; }
    .notif-content { flex: 1; }
    .notif-content .title { font-weight: 600; font-size: 0.875rem; }
    .notif-content .body { font-size: 0.8125rem; color: var(--on-surface-variant); margin-top: 0.125rem; }
    .notif-content .time { font-size: 0.75rem; color: var(--on-surface-variant); margin-top: 0.25rem; }
    .skeleton { background: linear-gradient(90deg, var(--surface-variant) 25%, var(--surface-container) 50%, var(--surface-variant) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 0.75rem; height: 72px; margin-bottom: 0.5rem; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--on-surface-variant); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .filter-bar button { padding: 0.375rem 0.75rem; border-radius: 999px; border: 1px solid var(--outline); background: transparent; color: var(--on-surface); font-size: 0.8125rem; cursor: pointer; }
    .filter-bar button.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
    @media (max-width: 768px) { .main { padding: 1rem; } }
  </style>
</head>
<body>
  <div data-include="/components/header"></div>
  <div class="layout">
    <div data-include="/students/components/learner-sidebar"></div>
    <main class="main">
      <div class="header">
        <h1>Notifications</h1>
        <button class="btn-outline" onclick="markAllRead()" style="padding:0.5rem 1rem;border-radius:0.5rem;border:1px solid var(--outline);background:none;cursor:pointer;font-size:0.8125rem">Mark All Read</button>
      </div>
      <div class="filter-bar">
        <button class="active" onclick="filterNotifs('all',this)">All</button>
        <button onclick="filterNotifs('unread',this)">Unread</button>
      </div>
      <div id="notif-list">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </main>
  </div>
  <div data-include="/components/footer"></div>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/dom.js"></script>
  <script src="/js/components/include.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script>
    if (!Shared.auth.requireAuth()) {}
    var currentFilter = 'all';
    document.addEventListener('DOMContentLoaded', loadNotifications);

    function loadNotifications() {
      var url = '/notifications/';
      if (currentFilter === 'unread') url += '?unread=true';
      api.get(url).then(function(res) {
        if (res.error) return;
        renderNotifications(res.data || []);
      });
    }

    function renderNotifications(list) {
      var el = document.getElementById('notif-list');
      if (!list.length) {
        el.innerHTML = '<div class="empty-state"><div class="icon">🔔</div><p>No notifications</p></div>';
        return;
      }
      el.innerHTML = list.map(function(n) {
        var unread = !n.readAt;
        return '<div class="notif-item' + (unread ? ' unread' : '') + '" onclick="markRead(\'' + n.id + '\',this)">' +
          '<div class="dot' + (unread ? '' : ' read') + '"></div>' +
          '<div class="notif-content">' +
          '<div class="title">' + Shared.escapeHtml(n.title || 'Notification') + '</div>' +
          (n.body ? '<div class="body">' + Shared.escapeHtml(n.body) + '</div>' : '') +
          '<div class="time">' + Shared.formatTime(n.createdAt) + '</div></div></div>';
      }).join('');
    }

    function markRead(id, el) {
      api.put('/notifications/' + id + '/read').then(function() {
        el.classList.remove('unread');
        el.querySelector('.dot').classList.add('read');
      });
    }

    function markAllRead() {
      api.post('/notifications/mark-all-read').then(function() {
        document.querySelectorAll('.notif-item').forEach(function(el) {
          el.classList.remove('unread');
          el.querySelector('.dot').classList.add('read');
        });
      });
    }

    function filterNotifs(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-bar button').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      loadNotifications();
    }
  </script>
</body>
</html>
