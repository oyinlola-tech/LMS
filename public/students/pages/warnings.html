<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Warnings</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 1.5rem; overflow-y: auto; }
    .admin-sidebar { width: 240px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .admin-sidebar .brand { font-size: 1.25rem; font-weight: 800; color: var(--on-surface); }
    .admin-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .admin-nav a .icon { font-size: 1.25rem; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    .page-header p { font-size: 0.875rem; color: var(--on-surface-variant); margin-top: 0.125rem; }
    .warnings-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .warning-card { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 1rem; padding: 1.25rem; transition: all 0.2s; }
    .warning-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .warning-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 0.5rem; }
    .warning-reason { font-size: 0.9375rem; font-weight: 700; color: var(--on-surface); line-height: 1.4; }
    .warning-meta { display: flex; align-items: center; gap: 1rem; font-size: 0.8125rem; color: var(--on-surface-variant); }
    .warning-meta span { display: flex; align-items: center; gap: 0.25rem; }
    .badge { display: inline-block; padding: 0.1875rem 0.5rem; border-radius: 0.5rem; font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
    .badge-unread { background: var(--error-container); color: var(--on-error-container); }
    .badge-read { background: var(--surface-container-high); color: var(--on-surface-variant); }
    .btn-mark-read { padding: 0.375rem 0.875rem; background: var(--primary-container); color: var(--on-primary-container); border: none; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: var(--transition); }
    .btn-mark-read:hover { background: var(--primary); color: #fff; }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--on-surface-variant); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/students/components/dashboard-sidebar"></div>
    <main class="admin-main">
      <div data-include="/students/components/dashboard-header"></div>
      <div class="page-header">
        <h1>Warnings</h1>
        <p>Account warnings from moderators</p>
      </div>
      <div id="warnings-list" class="warnings-list">
        <div style="text-align:center;padding:2rem;color:var(--on-surface-variant)">Loading warnings...</div>
      </div>
    </main>
  </div>
  <div data-include="/students/components/dashboard-bottom-nav"></div>
  <div data-include="auth-modal"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script>
    (function() {
      if (!localStorage.getItem('token')) { window.location.href = '/login'; return; }
      var $ = function(id) { return document.getElementById(id); };
      function loadWarnings() {
        var list = $('warnings-list');
        api.get('/users/warnings').then(function(r) {
          var items = r.data || [];
          if (!items.length) { list.innerHTML = '<div class="empty-state"><span class="icon material-symbols-outlined">warning</span><p>No warnings</p><p style="font-size:0.8125rem">You have no account warnings</p></div>'; return; }
          list.innerHTML = items.map(function(w) {
            var status = w.read ? 'Read' : 'Unread';
            var badgeClass = w.read ? 'badge-read' : 'badge-unread';
            var date = w.createdAt ? new Date(w.createdAt).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : '';
            var issuer = w.issuedBy && w.issuedBy.fullName ? w.issuedBy.fullName : (w.issuedBy || 'System');
            var markBtn = w.read ? '' : '<button class="btn-mark-read" onclick="markRead(\''+w.id+'\')">Mark Read</button>';
            return '<div class="warning-card"><div class="warning-header"><div class="warning-reason">'+(w.reason||'No reason provided')+'</div><div><span class="badge '+badgeClass+'">'+status+'</span></div></div><div class="warning-meta"><span>Issued by: '+issuer+'</span><span>'+date+'</span>'+markBtn+'</div></div>';
          }).join('');
        }).catch(function(e) { console.error(e); list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--error)">Failed to load warnings</div>'; });
      }
      window.markRead = function(id) {
        api.put('/admin/reports/warnings/'+id+'/read').then(loadWarnings).catch(function(e){console.error(e)});
      };
      document.addEventListener('components-loaded', loadWarnings);
    })();
  </script>
</body>
</html>
