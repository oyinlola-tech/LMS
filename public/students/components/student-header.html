<header class="admin-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
  <div style="display: flex; align-items: center; gap: 1rem;">
    <img src="/img/logo.svg" alt="LearnBridge" height="24" style="height: 24px"/>
    <span style="width: 1px; height: 24px; background: var(--outline-variant);"></span>
    <h1 style="font-size: 1.5rem; font-weight: 700; margin: 0;">My Dashboard</h1>
  </div>
  <div class="user-info" style="display: flex; align-items: center; gap: 0.75rem; font-size: 0.875rem; color: var(--on-surface-variant);">
    <span id="user-name">Learner</span>
    <button id="logout-btn" class="btn-icon" type="button" style="background: none; border: none; color: var(--on-surface-variant); cursor: pointer; padding: 0.25rem; border-radius: 0.5rem; font-size: 0.875rem;">Logout</button>
  </div>
</header>
