<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Messages</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: calc(100vh - 5rem);
      border-radius: 1rem;
      overflow: hidden;
      border: 1px solid var(--outline-variant);
      background: #fff;
    }
    .thread-list { border-right: 1px solid var(--outline-variant); overflow-y: auto; }
    .thread-item { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--outline-variant); }
    .thread-item:hover { background: var(--surface); }
    .thread-item.active { background: var(--primary-fixed); }
    .thread-item.unread { font-weight: 700; }
    .thread-avatar { width: 2.75rem; height: 2.75rem; border-radius: 50%; background-size: cover; background-position: center; flex-shrink: 0; }
    .chat-area { display: flex; flex-direction: column; height: 100%; }
    .chat-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--outline-variant); display: flex; align-items: center; gap: 1rem; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { max-width: 75%; padding: 0.75rem 1rem; border-radius: 1rem; line-height: 1.5; }
    .msg.sent { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 0.25rem; }
    .msg.received { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 0.25rem; }
    .msg-time { font-size: 0.65rem; opacity: 0.7; margin-top: 0.25rem; text-align: right; }
    .chat-input-area { padding: 1rem 1.5rem; border-top: 1px solid var(--outline-variant); display: flex; gap: 0.75rem; }
    .chat-input { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--outline-variant); border-radius: 2rem; outline: none; font-size: 0.9rem; }
    .chat-input:focus { border-color: var(--primary); }
    .empty-state { display: flex; align-items: center; justify-content: center; flex-direction: column; height: 100%; color: var(--on-surface-variant); gap: 1rem; }
    .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
    @media (max-width: 768px) {
      .messages-layout { grid-template-columns: 1fr; height: calc(100vh - 5rem); }
      .thread-list.mobile-hide { display: none; }
      .chat-area.mobile-hide { display: none; }
    }
  </style>
</head>
<body>
  <div data-include="header"></div>
  <main style="padding-top: 5rem">
    <div class="container" style="padding-top: 1rem; padding-bottom: 2rem">
      <div class="messages-layout" id="messages-layout">
        <div class="thread-list" id="thread-list">
          <div style="padding: 1rem; border-bottom: 1px solid var(--outline-variant)">
            <h2 class="text-lg font-black">Messages</h2>
            <input type="text" id="search-input" placeholder="Search conversations..." class="chat-input" style="margin-top: 0.75rem; font-size: 0.8rem"/>
          </div>
          <div id="threads-container"></div>
        </div>
        <div class="chat-area" id="chat-area">
          <div class="empty-state" id="empty-state">
            <span class="material-symbols-outlined" style="font-size: 3rem">chat</span>
            <p>Select a conversation</p>
          </div>
          <div id="chat-view" style="display:none;flex-direction:column;height:100%">
            <div class="chat-header" id="chat-header"></div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
              <input type="text" id="message-input" placeholder="Type a message..." class="chat-input" autocomplete="off"/>
              <button id="send-btn" class="btn-primary" style="border-radius: 50%; width: 2.75rem; height: 2.75rem; display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0">
                <span class="material-symbols-outlined" style="font-size: 1.25rem">send</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div data-include="footer"></div>
  <div data-include="auth-modal"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/messages.js"></script>
</body>
</html>
