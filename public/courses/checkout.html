<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Checkout</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    body { background: var(--surface); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .checkout-card { background: var(--surface-container); border-radius: 1.5rem; padding: 2.5rem; max-width: 440px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .checkout-card h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
    .checkout-card .sub { color: var(--on-surface-variant); font-size: 0.875rem; margin-bottom: 2rem; }
    .course-info { display: flex; gap: 1rem; margin-bottom: 2rem; padding: 1rem; border-radius: 1rem; background: var(--surface); }
    .course-info .thumb { width: 80px; height: 60px; border-radius: 0.5rem; background: var(--surface-variant); flex-shrink: 0; }
    .course-info .details { flex: 1; }
    .course-info .details h3 { margin: 0; font-size: 0.9375rem; }
    .course-info .details .meta { font-size: 0.75rem; color: var(--on-surface-variant); margin-top: 0.125rem; }
    .price-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--outline-variant); }
    .price-row .label { font-size: 0.875rem; }
    .price-row .amount { font-size: 1.25rem; font-weight: 700; }
    .total { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; margin-bottom: 1.5rem; }
    .total .label { font-weight: 600; }
    .total .amount { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .pay-btn { width: 100%; padding: 0.875rem; border-radius: 0.75rem; border: none; background: var(--primary); color: var(--on-primary); font-size: 1rem; font-weight: 700; cursor: pointer; transition: var(--transition); }
    .pay-btn:hover { opacity: 0.9; }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .pay-btn .spinner { display: none; }
    .pay-btn.loading .spinner { display: inline-block; }
    .pay-btn.loading .text { display: none; }
    .secure { text-align: center; margin-top: 1rem; font-size: 0.75rem; color: var(--on-surface-variant); }
    .error-msg { background: #fee2e2; color: #991b1b; padding: 0.75rem 1rem; border-radius: 0.75rem; margin-bottom: 1rem; font-size: 0.8125rem; display: none; }
    .back-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.8125rem; color: var(--on-surface-variant); text-decoration: none; }
    @media (max-width: 480px) { .checkout-card { padding: 1.5rem; } }
  </style>
</head>
<body>
  <div class="checkout-card">
    <h1>Checkout</h1>
    <p class="sub">Complete your purchase</p>
    <div id="error-msg" class="error-msg"></div>
    <div id="course-info" class="course-info">
      <div class="thumb"></div>
      <div class="details">
        <h3 id="course-title">-</h3>
        <div class="meta" id="course-meta"></div>
      </div>
    </div>
    <div class="price-row">
      <span class="label">Course Price</span>
      <span class="amount" id="course-price">-</span>
    </div>
    <div class="total">
      <span class="label">Total</span>
      <span class="amount" id="total-price">-</span>
    </div>
    <button class="pay-btn" id="pay-btn" onclick="payWithPaystack()">
      <span class="text">Pay with Paystack</span>
      <span class="spinner">Processing...</span>
    </button>
    <div class="secure">Secured by Paystack</div>
    <a href="/courses/catalog" class="back-link">← Back to courses</a>
  </div>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/dom.js"></script>
  <script>
    if (!Shared.auth.requireAuth()) {}
    var params = new URLSearchParams(window.location.search);
    var courseId = params.get('courseId');
    var courseData = null;

    document.addEventListener('DOMContentLoaded', function() {
      if (!courseId) { showError('No course selected'); return; }
      loadCourse();
    });

    function loadCourse() {
      api.get('/courses/' + courseId + '/pricing').then(function(res) {
        if (res.error) { showError(res.error.message); return; }
        courseData = res.data;
        document.getElementById('course-title').textContent = courseData.title || 'Course';
        document.getElementById('course-meta').textContent = courseData.category || '';
        var price = courseData.price || 0;
        var currency = courseData.currency || 'USD';
        document.getElementById('course-price').textContent = price > 0 ? Shared.formatCurrency(price, currency) : 'Free';
        document.getElementById('total-price').textContent = price > 0 ? Shared.formatCurrency(price, currency) : 'Free';
        if (price <= 0) {
          document.getElementById('pay-btn').querySelector('.text').textContent = 'Enroll Free';
        }
      });
    }

    function payWithPaystack() {
      if (!courseData || !courseData.price || courseData.price <= 0) {
        api.post('/courses/' + courseId + '/enroll', {}).then(function(res) {
          if (res.error) { showError(res.error.message); return; }
          window.location.href = '/checkout/success?courseId=' + courseId;
        });
        return;
      }
      var btn = document.getElementById('pay-btn');
      btn.disabled = true;
      btn.classList.add('loading');
      document.getElementById('error-msg').style.display = 'none';

      api.post('/payments/initialize', { courseId: courseId }).then(function(res) {
        btn.disabled = false;
        btn.classList.remove('loading');
        if (res.error) { showError(res.error.message); return; }
        var data = res.data;
        if (!data || !data.accessCode || !data.publicKey) {
          showError('Invalid payment response');
          return;
        }
        var handler = PaystackPop.setup({
          key: data.publicKey,
          email: data.email,
          amount: Shared.toLowestUnit(courseData.price || 0, courseData.currency || 'USD'),
          currency: (courseData.currency || 'USD').toLowerCase(),
          ref: data.reference,
          onClose: function() {
            window.location.href = '/checkout/cancel?courseId=' + courseId;
          },
          callback: function(response) {
            api.post('/payments/verify', { reference: response.reference }).then(function(verifyRes) {
              if (verifyRes.error) {
                showError(verifyRes.error.message || 'Payment verification failed');
                return;
              }
              window.location.href = '/checkout/success?reference=' + response.reference + '&courseId=' + courseId;
            }).catch(function() {
              window.location.href = '/checkout/success?reference=' + response.reference + '&courseId=' + courseId;
            });
          },
        });
        handler.openIframe();
      }).catch(function(err) {
        showError(err.data ? err.data.error.message : 'Payment initialization failed');
        btn.disabled = false;
        btn.classList.remove('loading');
      });
    }

    function showError(msg) {
      var el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
