<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Admin Settings</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
    .admin-sidebar { width: 260px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .admin-sidebar .brand { font-size: 1.25rem; font-weight: 800; color: var(--on-surface); letter-spacing: -0.02em; }
    .admin-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .admin-nav a .icon { font-size: 1.25rem; }
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    .settings-grid { display: grid; grid-template-columns: 240px 1fr; gap: 2rem; }
    .settings-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .settings-nav button { text-align: left; padding: 0.75rem 1rem; border: none; border-radius: 0.75rem; background: none; color: var(--on-surface-variant); font-size: 0.875rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: var(--transition); display: flex; align-items: center; gap: 0.75rem; }
    .settings-nav button:hover { background: var(--surface-container); color: var(--on-surface); }
    .settings-nav button.active { background: var(--primary-container); color: var(--on-primary-container); }
    .settings-nav button .icon { font-size: 1.25rem; }
    .settings-panel { display: none; }
    .settings-panel.active { display: block; }
    .settings-section { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .settings-section h2 { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.25rem; }
    .settings-section .desc { font-size: 0.8125rem; color: var(--on-surface-variant); margin-bottom: 1.25rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8125rem; font-weight: 600; margin-bottom: 0.375rem; color: var(--on-surface); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; background: var(--surface-container-lowest); color: var(--on-surface); font-size: 0.875rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn-primary { padding: 0.625rem 1.25rem; font-size: 0.8125rem; }
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--on-surface); color: var(--surface); padding: 0.75rem 1.25rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 500; z-index: 200; opacity: 0; transform: translateY(1rem); transition: all 0.3s; }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } .settings-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/admin/components/admin-sidebar"></div>
    <main class="admin-main">
      <div data-include="/admin/components/admin-header"></div>
      <div class="page-header">
        <h1>Settings</h1>
      </div>
      <div class="settings-grid">
        <nav class="settings-nav">
          <button class="active" data-panel="general"><span class="icon material-symbols-outlined">settings</span> General</button>
          <button data-panel="branding"><span class="icon material-symbols-outlined">palette</span> Branding</button>
          <button data-panel="email"><span class="icon material-symbols-outlined">mail</span> Email</button>
          <button data-panel="security"><span class="icon material-symbols-outlined">security</span> Security</button>
          <button data-panel="integrations"><span class="icon material-symbols-outlined">sync</span> Integrations</button>
        </nav>
        <div>
          <div class="settings-panel active" id="panel-general">
            <div class="settings-section">
              <h2>General Settings</h2>
              <p class="desc">Configure your platform name and contact information</p>
              <div class="form-group">
                <label for="app-name">Application Name</label>
                <input type="text" id="app-name" placeholder="LearnBridge"/>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="support-email">Support Email</label>
                  <input type="email" id="support-email" placeholder="support@example.com"/>
                </div>
                <div class="form-group">
                  <label for="support-email">Default Language</label>
                  <select id="default-lang"><option value="en">English</option><option value="fr">French</option><option value="es">Spanish</option></select>
                </div>
              </div>
              <button class="btn-primary" onclick="saveSettings('general')">Save Changes</button>
            </div>
          </div>
          <div class="settings-panel" id="panel-branding">
            <div class="settings-section">
              <h2>Branding</h2>
              <p class="desc">Customize your platform appearance</p>
              <div class="form-row">
                <div class="form-group">
                  <label for="brand-primary">Primary Color</label>
                  <input type="color" id="brand-primary" value="#004ac6" style="height:2.5rem;padding:0.25rem"/>
                </div>
                <div class="form-group">
                  <label for="brand-logo">Logo URL</label>
                  <input type="url" id="brand-logo" placeholder="https://example.com/logo.svg"/>
                </div>
              </div>
              <button class="btn-primary" onclick="saveSettings('branding')">Save Changes</button>
            </div>
          </div>
          <div class="settings-panel" id="panel-email">
            <div class="settings-section">
              <h2>Email Configuration</h2>
              <p class="desc">Configure SendByte or SMTP for transactional emails</p>
              <div class="form-group">
                <label for="sendbyte-key">SendByte API Key</label>
                <input type="password" id="sendbyte-key" placeholder="sk_test_..."/>
              </div>
              <div class="form-group">
                <label for="mail-from">From Address</label>
                <input type="email" id="mail-from" placeholder="noreply@learnbridge.com"/>
              </div>
              <button class="btn-primary" onclick="saveSettings('email')">Save Changes</button>
            </div>
          </div>
          <div class="settings-panel" id="panel-security">
            <div class="settings-section">
              <h2>Security</h2>
              <p class="desc">Manage authentication and rate limiting</p>
              <div class="form-row">
                <div class="form-group">
                  <label for="rate-limit-max">Rate Limit (requests)</label>
                  <input type="number" id="rate-limit-max" value="200"/>
                </div>
                <div class="form-group">
                  <label for="rate-limit-window">Rate Limit Window (ms)</label>
                  <input type="number" id="rate-limit-window" value="900000"/>
                </div>
              </div>
              <div class="form-group">
                <label for="require-otp">Require OTP for Login</label>
                <select id="require-otp"><option value="false">No</option><option value="true">Yes</option></select>
              </div>
              <button class="btn-primary" onclick="saveSettings('security')">Save Changes</button>
            </div>
          </div>
          <div class="settings-panel" id="panel-integrations">
            <div class="settings-section">
              <h2>Integrations</h2>
              <p class="desc">Manage third-party API keys</p>
              <div class="form-group">
                <label for="google-client-id">Google OAuth Client ID</label>
                <input type="text" id="google-client-id" placeholder="...apps.googleusercontent.com"/>
              </div>
              <div class="form-group">
                <label for="github-client-id">GitHub OAuth Client ID</label>
                <input type="text" id="github-client-id" placeholder="Iv1..."/>
              </div>
              <div class="form-group">
                <label for="fcm-key">Firebase Cloud Messaging Key</label>
                <input type="password" id="fcm-key" placeholder="AAAA..."/>
              </div>
              <button class="btn-primary" onclick="saveSettings('integrations')">Save Changes</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div data-include="/admin/components/admin-bottom-nav"></div>
  <div data-include="auth-modal"></div>
  <div id="toast" class="toast"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/admin.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    (function() {
      var token = localStorage.getItem('token');
      if (!token) { window.location.href = '/login'; return; }
      document.querySelectorAll('.settings-nav button').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.settings-nav button').forEach(function(b) { b.classList.remove('active'); });
          document.querySelectorAll('.settings-panel').forEach(function(p) { p.classList.remove('active'); });
          btn.classList.add('active');
          var panel = document.getElementById('panel-' + btn.getAttribute('data-panel'));
          if (panel) panel.classList.add('active');
        });
      });
      window.saveSettings = function(panel) {
        var toast = document.getElementById('toast');
        toast.textContent = 'Settings saved successfully';
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 3000);
      };
      document.addEventListener('components-loaded', function() {
        var userNameEl = document.getElementById('user-name');
        if (userNameEl) userNameEl.textContent = 'Admin';
      });
    })();
  </script>
</body>
</html>
