<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Admin Users</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
    .admin-sidebar { width: 260px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .admin-sidebar .brand { font-size: 1.25rem; font-weight: 800; color: var(--on-surface); letter-spacing: -0.02em; }
    .admin-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .admin-nav a .icon { font-size: 1.25rem; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    .toolbar { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .search-wrapper { display: flex; align-items: center; gap: 0.5rem; background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 0.75rem; padding: 0.5rem 0.75rem; flex: 1; min-width: 200px; max-width: 400px; }
    .search-wrapper input { border: none; background: none; outline: none; font-size: 0.875rem; color: var(--on-surface); width: 100%; font-family: inherit; }
    .filter-select { padding: 0.5rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.875rem; font-family: inherit; cursor: pointer; }
    .table-container { background: var(--surface-container); border-radius: 1rem; border: 1px solid var(--outline-variant); overflow: hidden; }
    .table-container table { width: 100%; border-collapse: collapse; }
    .table-container th { text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--on-surface-variant); border-bottom: 1px solid var(--outline-variant); background: var(--surface-container-high); }
    .table-container td { padding: 0.75rem 1rem; font-size: 0.875rem; border-bottom: 1px solid var(--outline-variant); }
    .table-container tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .badge.active { background: var(--primary-fixed); color: var(--on-primary-fixed); }
    .badge.inactive { background: var(--surface-container-high); color: var(--on-surface-variant); }
    .badge.suspended { background: var(--error-container); color: var(--on-error-container); }
    .btn-icon { background: none; border: none; color: var(--on-surface-variant); cursor: pointer; padding: 0.25rem; border-radius: 0.5rem; transition: var(--transition); font-size: 0.875rem; }
    .btn-icon:hover { background: var(--surface-container-high); color: var(--on-surface); }
    .user-avatar { width: 2rem; height: 2rem; border-radius: 50%; background: var(--surface-container-high); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--primary); flex-shrink: 0; }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; padding: 1rem; }
    .pagination button { padding: 0.375rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.5rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.8125rem; cursor: pointer; font-family: inherit; }
    .pagination button:hover { background: var(--surface-container-high); }
    .pagination button:disabled { opacity: 0.5; cursor: default; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--on-surface-variant); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/admin/components/admin-sidebar"></div>
    <main class="admin-main">
      <div data-include="/admin/components/admin-header"></div>
      <div class="page-header">
        <h1>Users</h1>
        <button class="btn-primary" onclick="showInviteModal()" style="padding:0.5rem 1rem;font-size:0.8125rem">
          <span class="material-symbols-outlined" style="font-size:1.125rem">person_add</span> Invite User
        </button>
      </div>
      <div class="toolbar">
        <div class="search-wrapper">
          <span class="material-symbols-outlined" style="font-size:1.25rem;color:var(--on-surface-variant)">search</span>
          <input type="text" id="search-input" placeholder="Search by name or email..." oninput="loadUsers()"/>
        </div>
        <select id="role-filter" class="filter-select" onchange="loadUsers()">
          <option value="">All Roles</option>
          <option value="learner">Learner</option>
          <option value="tutor">Tutor</option>
          <option value="admin">Admin</option>
        </select>
        <select id="status-filter" class="filter-select" onchange="loadUsers()">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="suspended">Suspended</option>
        </select>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Student ID</th>
              <th>Role</th>
              <th>Status</th>
              <th>Joined</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <tr><td colspan="7" style="text-align:center;color:var(--on-surface-variant);padding:2rem">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination">
        <button id="prev-page" onclick="changePage(-1)" disabled>Previous</button>
        <span id="page-info" style="font-size:0.8125rem;color:var(--on-surface-variant)">Page 1</span>
        <button id="next-page" onclick="changePage(1)">Next</button>
      </div>
    </main>
  </div>
  <div data-include="/admin/components/admin-bottom-nav"></div>
  <div data-include="auth-modal"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/admin.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    (function() {
      var token = localStorage.getItem('token');
      if (!token) { window.location.href = '/login'; return; }
      var currentPage = 1, pageSize = 20, totalPages = 1;
      var $ = function(id) { return document.getElementById(id); };
      function renderUsers(users) {
        var tbody = $('users-table-body');
        if (!users || users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="icon material-symbols-outlined">group_off</div><p>No users found</p></div></td></tr>';
          return;
        }
        tbody.innerHTML = users.map(function(u) {
          var initials = (u.fullName || '?').split(' ').map(function(s) { return s[0]; }).join('').substring(0, 2).toUpperCase();
          var roleBadge = 'badge ' + (u.role === 'admin' || u.role === 'super_admin' ? 'active' : '');
          var statusBadge = 'badge ' + (u.status === 'active' ? 'active' : u.status === 'suspended' ? 'suspended' : 'inactive');
          return '<tr>' +
            '<td><div style="display:flex;align-items:center;gap:0.75rem"><div class="user-avatar">' + initials + '</div><span style="font-weight:600">' + (u.fullName || '—') + '</span></div></td>' +
            '<td>' + (u.email || '—') + '</td>' +
            '<td style="font-size:0.8125rem;color:var(--on-surface-variant)">' + (u.studentId || '—') + '</td>' +
            '<td><span class="' + roleBadge + '">' + (u.role || 'learner') + '</span></td>' +
            '<td><span class="' + statusBadge + '">' + (u.status === 'active' ? 'Active' : u.status === 'suspended' ? 'Suspended' : 'Inactive') + '</span></td>' +
            '<td style="font-size:0.8125rem;color:var(--on-surface-variant)">' + (u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—') + '</td>' +
            '<td><button class="btn-icon" onclick="viewUser(\'' + u.id + '\')" title="View"><span class="material-symbols-outlined">visibility</span></button></td>' +
            '</tr>';
        }).join('');
      }
      window.loadUsers = function() {
        var search = ($('search-input') || {}).value || '';
        var role = ($('role-filter') || {}).value || '';
        var status = ($('status-filter') || {}).value || '';
        AdminAPI.listUsers({ limit: String(pageSize), page: String(currentPage), search: search, role: role, status: status })
          .then(function(res) {
            var data = res.data || {};
            var items = data.items || data.users || [];
            totalPages = data.totalPages || data.total ? Math.ceil(data.total / pageSize) : 1;
            renderUsers(items);
            $('page-info').textContent = 'Page ' + currentPage + ' of ' + totalPages;
            $('prev-page').disabled = currentPage <= 1;
            $('next-page').disabled = currentPage >= totalPages;
          })
          .catch(function(err) {
            console.error('Load users error:', err);
            $('users-table-body').innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--error);padding:2rem">Failed to load users</td></tr>';
          });
      };
      window.changePage = function(delta) {
        currentPage = Math.max(1, Math.min(currentPage + delta, totalPages));
        loadUsers();
      };
      window.viewUser = function(id) {
        window.location.href = '/admin/users/' + id;
      };
      document.addEventListener('components-loaded', loadUsers);
    })();
  </script>
</body>
</html>
