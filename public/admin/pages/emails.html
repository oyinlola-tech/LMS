<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Email Logs</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
    .admin-sidebar { width: 260px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .admin-sidebar .brand { font-size: 1.25rem; font-weight: 800; color: var(--on-surface); letter-spacing: -0.02em; }
    .admin-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .admin-nav a .icon { font-size: 1.25rem; }
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--outline-variant); }
    th { font-weight: 600; color: var(--on-surface-variant); font-size: 0.75rem; text-transform: uppercase; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.6875rem; font-weight: 600; }
    .badge.queued { background: #fef3c7; color: #92400e; }
    .badge.sent { background: #dbeafe; color: #1e40af; }
    .badge.delivered { background: #d1fae5; color: #065f46; }
    .badge.opened { background: #e0e7ff; color: #3730a3; }
    .badge.clicked { background: #fce7f3; color: #9d174d; }
    .badge.bounced { background: #fee2e2; color: #991b1b; }
    .badge.complained { background: #7f1d1d; color: #fef2f2; }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/admin/components/admin-sidebar"></div>
    <main class="admin-main">
      <div data-include="/admin/components/admin-header"></div>
      <div class="page-header">
        <h1>Email Logs</h1>
      </div>
      <table><thead><tr><th>To</th><th>Subject</th><th>Status</th><th>Sent</th><th>Delivered</th></tr></thead>
        <tbody id="emails-body"><tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--on-surface-variant)">Loading...</td></tr></tbody>
      </table>
    </main>
  </div>
  <div data-include="/admin/components/admin-bottom-nav"></div>
  <div data-include="auth-modal"></div>
  <div id="toast" class="toast"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/admin.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    (function() {
      var token = localStorage.getItem('token');
      if (!token) { window.location.href = '/login'; return; }
      document.addEventListener('components-loaded', function() {
        loadEmails();
      });
      function loadEmails() {
        api.get('/admin/emails/logs?limit=50').then(function(res) {
          var tbody = document.getElementById('emails-body');
          if (res.error || !res.data || !res.data.items || !res.data.items.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--on-surface-variant)">No emails yet</td></tr>';
            return;
          }
          tbody.innerHTML = res.data.items.map(function(e) {
            return '<tr>'
              + '<td>' + Shared.escapeHtml(e.to || '-') + '</td>'
              + '<td>' + Shared.escapeHtml(e.subject || '-') + '</td>'
              + '<td><span class="badge ' + (e.status || 'queued') + '">' + (e.status || 'queued') + '</span></td>'
              + '<td>' + Shared.formatTime(e.sentAt) + '</td>'
              + '<td>' + Shared.formatTime(e.deliveredAt) + '</td>'
              + '</tr>';
          }).join('');
        }).catch(function() {});
      }
    })();
  </script>
</body>
</html>
