<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Mentors</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; border-bottom: 1px solid var(--outline-variant); background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); padding: 0.75rem 1rem; }
    .header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .header-links { display: flex; align-items: center; gap: 1.5rem; }
    .header-links a { font-size: 0.875rem; font-weight: 500; color: var(--on-surface-variant); text-decoration: none; }
    .header-links a:hover { color: var(--primary); }
    main { margin-top: 4rem; }
    .hero { padding: 4rem 1.5rem; text-align: center; max-width: 640px; margin: 0 auto; }
    .hero h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.75rem; }
    .hero p { font-size: 1.125rem; color: var(--on-surface-variant); }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
    .toolbar { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; }
    .search-wrapper { display: flex; align-items: center; gap: 0.5rem; background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 0.75rem; padding: 0.5rem 0.75rem; flex: 1; max-width: 400px; }
    .search-wrapper input { border: none; background: none; outline: none; font-size: 0.875rem; color: var(--on-surface); width: 100%; font-family: inherit; }
    .filter-select { padding: 0.5rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.875rem; font-family: inherit; cursor: pointer; }
    .mentors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; padding-bottom: 4rem; }
    .mentor-card { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 1rem; padding: 1.5rem; text-align: center; transition: all 0.2s; }
    .mentor-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
    .mentor-avatar { width: 5rem; height: 5rem; border-radius: 50%; background: var(--surface-container-high); margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; color: var(--primary); overflow: hidden; }
    .mentor-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .mentor-card h3 { font-size: 1.0625rem; font-weight: 700; margin-bottom: 0.25rem; }
    .mentor-card .title { font-size: 0.8125rem; color: var(--on-surface-variant); margin-bottom: 0.75rem; }
    .mentor-card .bio { font-size: 0.8125rem; color: var(--on-surface-variant); line-height: 1.5; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .mentor-card .specialties { display: flex; gap: 0.375rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1rem; }
    .mentor-card .specialty { padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.6875rem; font-weight: 600; background: var(--primary-fixed); color: var(--on-primary-fixed); }
    .mentor-card .stats { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; }
    .mentor-card .stats .stat { text-align: center; }
    .mentor-card .stats .stat .num { font-size: 1rem; font-weight: 700; color: var(--on-surface); }
    .mentor-card .stats .stat .lbl { font-size: 0.6875rem; color: var(--on-surface-variant); text-transform: uppercase; letter-spacing: 0.05em; }
    .mentor-card .rating { color: #f59e0b; font-size: 0.875rem; margin-bottom: 1rem; }
    .btn-mentor { display: inline-block; padding: 0.5rem 1.25rem; background: var(--primary); color: #fff; border: none; border-radius: 0.75rem; font-size: 0.8125rem; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; }
    .btn-mentor:hover { background: var(--surface-tint); }
    .pagination { display: flex; justify-content: center; gap: 0.5rem; padding-bottom: 4rem; }
    .pagination button { padding: 0.5rem 1rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.875rem; cursor: pointer; font-family: inherit; }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--on-surface-variant); grid-column: 1/-1; }
    footer { border-top: 1px solid var(--outline-variant); padding: 2rem 1.5rem; text-align: center; font-size: 0.8125rem; color: var(--on-surface-variant); }
    @media (max-width: 768px) { .hero h1 { font-size: 1.75rem; } .mentors-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="fixed-header">
    <div class="header-inner">
      <a href="/" style="font-size:1.25rem;font-weight:800;text-decoration:none;color:var(--on-surface)">LearnBridge</a>
      <nav class="header-links">
        <a href="/courses">Courses</a>
        <a href="/blog">Blog</a>
        <a href="/mentors" style="color:var(--primary)">Mentors</a>
        <a href="/about">About</a>
        <a href="/login" class="btn-primary" style="padding:0.5rem 1rem;font-size:0.8125rem;text-decoration:none">Sign In</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="hero">
      <h1>Find a Mentor</h1>
      <p>Connect with experienced professionals who can guide your learning journey</p>
    </div>
    <div class="container">
      <div class="toolbar">
        <div class="search-wrapper">
          <span class="material-symbols-outlined" style="font-size:1.25rem;color:var(--on-surface-variant)">search</span>
          <input type="text" id="search-input" placeholder="Search mentors..." oninput="loadMentors()"/>
        </div>
        <select id="specialty-filter" class="filter-select" onchange="loadMentors()">
          <option value="">All Specialties</option>
          <option value="frontend">Frontend</option>
          <option value="backend">Backend</option>
          <option value="data-science">Data Science</option>
          <option value="design">Design</option>
          <option value="mobile">Mobile</option>
          <option value="devops">DevOps</option>
        </select>
      </div>
      <div id="mentors-grid" class="mentors-grid">
        <div class="empty-state"><span class="material-symbols-outlined" style="font-size:2.5rem;display:block;margin-bottom:0.5rem">groups</span><p>Loading mentors...</p></div>
      </div>
      <div class="pagination">
        <button id="prev-page" onclick="changePage(-1)" disabled>Previous</button>
        <span id="page-info" style="font-size:0.875rem;color:var(--on-surface-variant)">Page 1</span>
        <button id="next-page" onclick="changePage(1)">Next</button>
      </div>
    </div>
  </main>
  <footer>&copy; 2026 LearnBridge. All rights reserved.</footer>
  <div data-include="auth-modal"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    (function() {
      var currentPage = 1, pageSize = 12, totalPages = 1;
      var $ = function(id) { return document.getElementById(id); };
      function loadMentors() {
        var search = ($('search-input')||{}).value||'';
        var spec = ($('specialty-filter')||{}).value||'';
        var path = '/instructors?limit='+pageSize+'&page='+currentPage+'&search='+encodeURIComponent(search);
        if (spec) path += '&specialty='+spec;
        api.get(path).then(function(r) {
          var items = r.data || r.instructors || r.mentors || [];
          totalPages = r.totalPages || (r.total ? Math.ceil(r.total/pageSize) : 1);
          var grid = $('mentors-grid');
          if (!items.length) { grid.innerHTML = '<div class="empty-state"><span class="material-symbols-outlined" style="font-size:2.5rem;display:block;margin-bottom:0.5rem">search_off</span><p>No mentors found</p></div>'; return; }
          grid.innerHTML = items.map(function(m) {
            var initials = (m.fullName||'M').split(' ').map(function(s){return s[0]}).join('').substring(0,2).toUpperCase();
            var specialties = (m.specialties||m.skills||[]).map(function(s){return '<span class="specialty">'+(typeof s==='string'?s:s.name||s)+'</span>';}).join('');
            var rating = m.rating || 0;
            var stars = '';
            for (var i = 0; i < 5; i++) { stars += i < Math.round(rating) ? '★' : '☆'; }
            return '<div class="mentor-card"><div class="mentor-avatar">'+(m.avatarUrl?'<img src="'+m.avatarUrl+'" alt=""/>':'<span>'+initials+'</span>')+'</div><h3>'+(m.fullName||'Mentor')+'</h3><div class="title">'+(m.title||m.headline||'Mentor')+'</div><div class="bio">'+(m.bio||m.biography||'')+'</div><div class="specialties">'+(specialties||'<span class="specialty">General</span>')+'</div><div class="stats"><div class="stat"><div class="num">'+(m.courseCount||0)+'</div><div class="lbl">Courses</div></div><div class="stat"><div class="num">'+(m.studentCount||0)+'</div><div class="lbl">Students</div></div></div><div class="rating">'+stars+' <span style="color:var(--on-surface-variant);font-size:0.75rem">('+(rating||'0')+')</span></div><a class="btn-mentor" href="/mentorship/'+m.id+'">View Profile</a></div>';
          }).join('');
          $('page-info').textContent = 'Page '+currentPage+' of '+totalPages;
          $('prev-page').disabled = currentPage <= 1;
          $('next-page').disabled = currentPage >= totalPages;
        }).catch(function(e) { console.error(e); $('mentors-grid').innerHTML = '<div class="empty-state" style="color:var(--error)">Failed to load mentors</div>'; });
      }
      window.loadMentors = loadMentors;
      window.changePage = function(d) { currentPage = Math.max(1, Math.min(currentPage+d, totalPages)); loadMentors(); };
      document.addEventListener('components-loaded', loadMentors);
    })();
  </script>
</body>
</html>
