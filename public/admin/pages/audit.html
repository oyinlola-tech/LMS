<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Audit Log</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
    .admin-sidebar { width: 240px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .admin-sidebar .brand { font-size: 1.25rem; font-weight: 800; color: var(--on-surface); }
    .admin-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .admin-nav a .icon { font-size: 1.25rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--outline-variant); }
    th { font-weight: 600; color: var(--on-surface-variant); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { color: var(--on-surface); }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.6875rem; font-weight: 600; }
    .badge.info { background: var(--primary-container); color: var(--on-primary-container); }
    .badge.warn { background: #fef3c7; color: #92400e; }
    .badge.error { background: #fee2e2; color: #991b1b; }
    .pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; }
    .pagination button { padding: 0.375rem 0.75rem; border-radius: 0.375rem; border: 1px solid var(--outline); background: var(--surface); cursor: pointer; font-size: 0.8125rem; }
    .pagination button.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
    .search-bar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; align-items: center; }
    .search-bar input { flex: 1; max-width: 300px; padding: 0.5rem 0.75rem; border-radius: 0.5rem; border: 1px solid var(--outline); background: var(--surface); font-size: 0.875rem; }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } table { font-size: 0.75rem; } th, td { padding: 0.5rem; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/admin/components/admin-sidebar"></div>
    <main class="admin-main">
      <h1 style="font-size:1.5rem;margin:0 0 1.5rem">Audit Log</h1>
      <table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Details</th><th>IP</th></tr></thead>
        <tbody id="audit-body"><tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--on-surface-variant)">Loading...</td></tr></tbody>
      </table>
      <div class="pagination" id="audit-pagination"></div>
    </main>
  </div>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/dom.js"></script>
  <script src="/js/components/include.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script>
    if (!Shared.auth.requireAuth()) {}
    document.addEventListener('DOMContentLoaded', loadAudit);
    function loadAudit() {
      api.get('/admin/dashboard/audit?limit=50').then(function(res) {
        var tbody = document.getElementById('audit-body');
        if (res.error || !res.data || !res.data.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--on-surface-variant)">No audit records found</td></tr>';
          return;
        }
        tbody.innerHTML = res.data.map(function(a) {
          var cls = a.level === 'error' ? 'error' : a.level === 'warn' ? 'warn' : 'info';
          return '<tr><td>' + Shared.formatTime(a.createdAt) + '</td><td>' + Shared.escapeHtml(a.userId || a.UserId || '-') + '</td>' +
            '<td><span class="badge ' + cls + '">' + Shared.escapeHtml(a.action || '-') + '</span></td>' +
            '<td>' + Shared.escapeHtml(typeof a.details === 'string' ? a.details : JSON.stringify(a.details || '')) + '</td>' +
            '<td>' + Shared.escapeHtml(a.ip || '-') + '</td></tr>';
        }).join('');
      });
    }
  </script>
</body>
</html>
