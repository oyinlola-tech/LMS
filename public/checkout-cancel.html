<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Payment Canceled</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: var(--surface-container); border-radius: 1.5rem; padding: 3rem; max-width: 420px; width: 90%; text-align: center; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: var(--on-surface-variant); font-size: 0.875rem; margin: 0 0 2rem; }
    .btn { display: inline-block; padding: 0.75rem 2rem; border-radius: 0.75rem; background: var(--primary); color: var(--on-primary); text-decoration: none; font-weight: 600; }
    .btn-outline { display: inline-block; padding: 0.75rem 2rem; border-radius: 0.75rem; border: 1px solid var(--outline); color: var(--on-surface); text-decoration: none; font-weight: 600; margin-right: 0.75rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛒</div>
    <h1>Payment Canceled</h1>
    <p>Your payment was not completed. You can try again anytime.</p>
    <a class="btn-outline" href="/courses/catalog">Browse Courses</a>
    <a class="btn" href="/checkout?courseId=' + encodeURIComponent(new URLSearchParams(window.location.search).get('courseId') || '') + '">Try Again</a>
  </div>
</body>
</html>
