<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Recommended Courses</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .hero-section { text-align: center; padding: 3rem 1.5rem 2rem; max-width: 640px; margin: 0 auto; }
    .hero-section h1 { font-size: 1.75rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .hero-section p { color: var(--on-surface-variant); line-height: 1.6; }
    .search-bar { max-width: 480px; margin: 0 auto 2rem; display: flex; gap: 0.5rem; align-items: center; background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 0.75rem; padding: 0.5rem 0.75rem; }
    .search-bar input { border: none; background: none; outline: none; font-size: 0.875rem; color: var(--on-surface); width: 100%; font-family: inherit; }
    .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; }
    .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; padding-bottom: 3rem; }
    .course-card { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 1rem; overflow: hidden; transition: all 0.2s; cursor: pointer; }
    .course-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
    .course-card-img { height: 140px; background: var(--surface-container-high); display: flex; align-items: center; justify-content: center; color: var(--primary-fixed-dim); font-size: 2rem; }
    .course-card-body { padding: 1rem; }
    .course-card-body h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; line-height: 1.3; }
    .course-card-body p { font-size: 0.8125rem; color: var(--on-surface-variant); line-height: 1.5; margin-bottom: 0.75rem; }
    .course-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--on-surface-variant); }
    .difficulty-badge { padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.6875rem; font-weight: 600; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--on-surface-variant); grid-column: 1/-1; }
    .browse-link { display: inline-block; margin-top: 1rem; color: var(--primary); font-weight: 600; font-size: 0.875rem; }
    @media (max-width: 640px) { .course-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div data-include="/blog/blog-header"></div>
  <main style="padding-top: 5rem">
    <div class="hero-section">
      <h1>Welcome to LearnBridge</h1>
      <p>Here are courses tailored to your interests. Search for anything else you'd like to learn.</p>
    </div>
    <div class="container" style="max-width: 72rem; padding: 0 1.5rem">
      <div class="search-bar">
        <span class="material-symbols-outlined" style="font-size:1.25rem;color:var(--on-surface-variant)">search</span>
        <input type="text" id="course-search" placeholder="Search courses..." oninput="searchCourses()"/>
      </div>
      <h2 class="section-title" id="section-title">Recommended For You</h2>
      <div id="course-grid" class="course-grid">
        <div class="empty-state">Loading courses...</div>
      </div>
      <div style="text-align:center;padding-bottom:3rem">
        <a href="/courses/catalog" class="browse-link">Browse Full Catalog &rarr;</a>
      </div>
    </div>
  </main>
  <div data-include="/blog/blog-footer"></div>
  <div data-include="auth-modal"></div>
<script src="/js/components/include.js"></script>
  <script src="/js/components/auth-ui.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    var currentQuery = '';

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderCourses(courses) {
      var grid = document.getElementById('course-grid');
      if (!courses || !courses.length) {
        grid.innerHTML = '<div class="empty-state"><p>No courses found. Try a different search or <a href="/courses/catalog" style="color:var(--primary)">browse all courses</a>.</p></div>';
        return;
      }
      grid.innerHTML = courses.map(function(c) {
        var diff = c.difficulty || 'beginner';
        var diffColors = { beginner: 'background:#e8f5e9;color:#2e7d32', intermediate: 'background:#fff3e0;color:#e65100', expert: 'background:#fce4ec;color:#c62828' };
        return '<div class="course-card" onclick="window.location.href=\'/courses/' + c.id + '/details\'">' +
          '<div class="course-card-img"><span class="material-symbols-outlined">school</span></div>' +
          '<div class="course-card-body">' +
          '<h3>' + escapeHtml(c.title) + '</h3>' +
          '<p>' + escapeHtml(c.description ? c.description.substring(0, 120) + (c.description.length > 120 ? '...' : '') : '') + '</p>' +
          '<div class="course-meta">' +
          '<span class="difficulty-badge" style="' + (diffColors[diff] || diffColors.beginner) + '">' + diff + '</span>' +
          '<span>' + (c.instructorName || 'Expert Instructor') + '</span>' +
          '</div></div></div>';
      }).join('');
    }

    function loadRecommended() {
      api.get('/api/courses/recommended').then(function(r) {
        var courses = r.data || [];
        document.getElementById('section-title').textContent = 'Recommended For You';
        renderCourses(courses);
      }).catch(function() {
        document.getElementById('course-grid').innerHTML = '<div class="empty-state"><p>Could not load recommendations. <a href="/courses/catalog" style="color:var(--primary)">Browse all courses</a> instead.</p></div>';
      });
    }

    window.searchCourses = function() {
      var q = (document.getElementById('course-search') || {}).value || '';
      if (!q.trim()) { loadRecommended(); return; }
      document.getElementById('section-title').textContent = 'Search Results';
      var grid = document.getElementById('course-grid');
      grid.innerHTML = '<div class="empty-state">Searching...</div>';
      api.get('/api/courses?q=' + encodeURIComponent(q.trim())).then(function(r) {
        renderCourses(r.data || []);
      }).catch(function() {
        grid.innerHTML = '<div class="empty-state"><p>Search failed. Please try again.</p></div>';
      });
    };

    document.addEventListener('components-loaded', loadRecommended);
  </script>
</body>
</html>
