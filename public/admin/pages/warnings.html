<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Warnings</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
    .admin-sidebar { width: 260px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .admin-sidebar .brand { font-size: 1.25rem; font-weight: 800; color: var(--on-surface); letter-spacing: -0.02em; }
    .admin-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .admin-nav a .icon { font-size: 1.25rem; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    .page-header p { font-size: 0.875rem; color: var(--on-surface-variant); margin-top: 0.125rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--outline-variant); }
    th { font-weight: 600; color: var(--on-surface-variant); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; background: var(--surface-container-high); }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.6875rem; font-weight: 600; }
    .badge-unread { background: var(--error-container); color: var(--on-error-container); }
    .badge-read { background: var(--surface-container-high); color: var(--on-surface-variant); }
    .pagination { display: flex; gap: 0.5rem; justify-content: center; align-items: center; margin-top: 1.5rem; }
    .pagination button { padding: 0.375rem 0.75rem; border-radius: 0.375rem; border: 1px solid var(--outline); background: var(--surface); cursor: pointer; font-size: 0.8125rem; }
    .pagination button:disabled { opacity: 0.5; cursor: default; }
    .pagination button.active { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
    .pagination span { font-size: 0.8125rem; color: var(--on-surface-variant); }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/admin/components/admin-sidebar"></div>
    <main class="admin-main">
      <div data-include="/admin/components/admin-header"></div>
      <div class="page-header">
        <h1>Warnings</h1>
        <p>Manage user warnings</p>
      </div>
      <table><thead><tr><th>User</th><th>Issued By</th><th>Reason</th><th>Date</th><th>Status</th></tr></thead>
        <tbody id="warnings-body"><tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--on-surface-variant)">Loading...</td></tr></tbody>
      </table>
      <div class="pagination" id="pagination">
        <button id="prev-page" onclick="changePage(-1)" disabled>Previous</button>
        <span id="page-info">Page 1</span>
        <button id="next-page" onclick="changePage(1)">Next</button>
      </div>
    </main>
  </div>
  <div data-include="/admin/components/admin-bottom-nav"></div>
  <div data-include="auth-modal"></div>
  <div id="toast" class="toast"></div>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/dom.js"></script>
  <script src="/js/components/include.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    if (!Shared.auth.requireAuth()) {}
    var currentPage = 1, pageSize = 20, totalPages = 1;
    document.addEventListener('components-loaded', loadWarnings);

    function loadWarnings() {
      api.get('/admin/reports/warnings?limit=' + pageSize + '&page=' + currentPage).then(function(res) {
        var tbody = document.getElementById('warnings-body');
        if (res.error || !res.data || !res.data.items || !res.data.items.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--on-surface-variant)">No warnings</td></tr>';
          return;
        }
        var data = res.data;
        totalPages = data.total ? Math.ceil(data.total / pageSize) : 1;
        tbody.innerHTML = data.items.map(function(w) {
          var status = w.readAt ? 'Read' : 'Unread';
          var badgeClass = w.readAt ? 'badge-read' : 'badge-unread';
          return '<tr>' +
            '<td>' + Shared.escapeHtml(w.user?.fullName || '-') + '</td>' +
            '<td>' + Shared.escapeHtml(w.issuedBy?.fullName || '-') + '</td>' +
            '<td>' + Shared.escapeHtml(w.reason || '-') + '</td>' +
            '<td>' + Shared.formatTime(w.createdAt) + '</td>' +
            '<td><span class="badge ' + badgeClass + '">' + status + '</span></td>' +
            '</tr>';
        }).join('');
        document.getElementById('page-info').textContent = 'Page ' + currentPage + ' of ' + totalPages;
        document.getElementById('prev-page').disabled = currentPage <= 1;
        document.getElementById('next-page').disabled = currentPage >= totalPages;
      }).catch(function() {
        document.getElementById('warnings-body').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--error)">Failed to load warnings</td></tr>';
      });
    }

    function changePage(delta) {
      currentPage = Math.max(1, Math.min(currentPage + delta, totalPages));
      loadWarnings();
    }
  </script>
</body>
</html>
