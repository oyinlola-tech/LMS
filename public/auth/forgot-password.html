<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Forgot Password</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/auth.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
</head>
<body>
  <div class="auth-split">
    <div class="auth-image-panel">
      <img alt="Educational setting" src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&q=80"/>
      <div class="auth-image-overlay"></div>
      <div class="auth-image-content">
        <h1>Forgot your password?</h1>
        <p>No worries. We'll help you reset it in just a few steps.</p>
      </div>
    </div>
    <div class="auth-form-panel">
      <div class="auth-form-wrapper">
        <div class="auth-mobile-brand">
          <span>LearnBridge</span>
        </div>
        <div class="auth-header">
          <h2>Reset password</h2>
          <p>Enter the email address associated with your account and we'll send you a reset link.</p>
        </div>
        <form id="forgot-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <span class="material-symbols-outlined">mail</span>
              <input class="form-input input-icon" id="email" name="email" placeholder="you@example.com" type="email" required/>
            </div>
          </div>
          <div id="form-error" class="form-error" style="display:none; margin-bottom: 1rem"></div>
          <div id="form-success" style="display:none; padding: 0.75rem 1rem; background: var(--primary-fixed); color: var(--on-primary-fixed); border-radius: 0.75rem; font-size: 0.875rem; margin-bottom: 1rem"></div>
          <button class="btn-submit" type="submit">Send Reset Link</button>
        </form>
        <div class="auth-footer">
          <p><a href="/login">Back to login</a></p>
        </div>
      </div>
    </div>
  </div>

  <div data-include="auth-modal"></div>

  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/auth/forgot-password.js"></script>
</body>
</html>
