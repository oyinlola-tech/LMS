<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Course Builder</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .layout { display: flex; min-height: 100vh; }
    .main { flex: 1; padding: 2rem; max-width: 1000px; margin: 0 auto; width: 100%; }
    .tutor-sidebar { width: 240px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .tutor-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; }
    .tutor-nav a:hover, .tutor-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .steps { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 1px solid var(--outline-variant); }
    .steps button { padding: 0.75rem 1.25rem; font-size: 0.8125rem; font-weight: 600; border: none; background: none; color: var(--on-surface-variant); cursor: pointer; border-bottom: 2px solid transparent; }
    .steps button.active { color: var(--primary); border-bottom-color: var(--primary); }
    .steps button.completed { color: #059669; }
    .step-panel { display: none; }
    .step-panel.active { display: block; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8125rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--on-surface-variant); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.625rem 0.75rem; border-radius: 0.5rem; border: 1px solid var(--outline); background: var(--surface); font-family: inherit; font-size: 0.875rem; box-sizing: border-box; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .form-row { display: flex; gap: 1rem; }
    .form-row .form-group { flex: 1; }
    .module-item { padding: 1rem; border-radius: 0.75rem; background: var(--surface-container); margin-bottom: 0.75rem; }
    .module-item .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .module-item .header h3 { margin: 0; font-size: 1rem; }
    .module-item .lessons { margin-left: 1.5rem; }
    .lesson-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; border-radius: 0.5rem; margin-bottom: 0.25rem; }
    .lesson-item:hover { background: var(--surface-variant); }
    .lesson-item .icon { font-size: 0.875rem; }
    .lesson-item .name { flex: 1; font-size: 0.875rem; }
    .lesson-item .type { font-size: 0.6875rem; padding: 0.125rem 0.375rem; border-radius: 0.25rem; background: var(--surface); }
    .btn-sm { padding: 0.25rem 0.75rem; border-radius: 0.375rem; border: 1px solid var(--outline); background: var(--surface); cursor: pointer; font-size: 0.75rem; }
    .btn-sm.primary { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
    .btn-primary { padding: 0.625rem 1.25rem; border-radius: 0.5rem; border: none; background: var(--primary); color: var(--on-primary); font-weight: 600; cursor: pointer; }
    .btn-outline { padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid var(--outline); background: transparent; cursor: pointer; font-size: 0.8125rem; }
    .content-block-item { padding: 0.75rem; border-radius: 0.5rem; background: var(--surface); margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .content-block-item .info { flex: 1; }
    .content-block-item .info .heading { font-weight: 600; font-size: 0.875rem; }
    .content-block-item .info .sub { font-size: 0.75rem; color: var(--on-surface-variant); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--surface-container); border-radius: 1rem; padding: 2rem; width: 90%; max-width: 550px; max-height: 80vh; overflow-y: auto; }
    .modal-box h2 { margin: 0 0 1rem; font-size: 1.125rem; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1rem; }
    .empty-state { text-align: center; padding: 2rem 1rem; color: var(--on-surface-variant); }
    @media (max-width: 768px) { .tutor-sidebar { display: none; } .main { padding: 1rem; } .form-row { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="layout">
    <div data-include="/tutors/components/tutor-sidebar"></div>
    <main class="main">
      <h1 style="font-size:1.5rem;margin:0 0 1.5rem">Course Builder</h1>
      <div class="steps" id="steps">
        <button class="active" onclick="goStep(1)">1. Details</button>
        <button onclick="goStep(2)">2. Curriculum</button>
        <button onclick="goStep(3)">3. Publish</button>
      </div>

      <!-- Step 1: Details -->
      <div class="step-panel active" id="step-1">
        <div class="form-group"><label>Course Title</label><input id="course-title" placeholder="e.g., Introduction to Web Development"/></div>
        <div class="form-group"><label>Description</label><textarea id="course-desc" placeholder="Describe what students will learn..."></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Category</label><input id="course-category" placeholder="e.g., Web Development"/></div>
          <div class="form-group"><label>Price ($)</label><input id="course-price" type="number" step="0.01" min="0" placeholder="0.00"/></div>
        </div>
        <div class="form-group"><label>Perks (one per line)</label><textarea id="course-perks" placeholder="Full lifetime access&#10;Certificate of completion&#10;Q&A support" rows="4"></textarea></div>
        <button class="btn-primary" onclick="saveDetails()">Save Details</button>
        <span id="details-status" style="margin-left:1rem;font-size:0.875rem;color:var(--on-surface-variant)"></span>
      </div>

      <!-- Step 2: Curriculum -->
      <div class="step-panel" id="step-2">
        <div id="modules-container"><div class="empty-state"><p>No modules yet. Start building your curriculum!</p></div></div>
        <button class="btn-outline" onclick="openModuleModal()" style="margin-top:1rem">+ Add Module</button>
      </div>

      <!-- Step 3: Publish -->
      <div class="step-panel" id="step-3">
        <div id="publish-info"></div>
        <div style="margin-top:1.5rem;display:flex;gap:0.75rem">
          <button class="btn-primary" id="publish-btn" onclick="publishCourse()">Publish Course</button>
          <button class="btn-outline" onclick="previewCourse()">Preview</button>
        </div>
        <p id="publish-status" style="margin-top:1rem;font-size:0.875rem"></p>
      </div>
    </main>
  </div>

  <!-- Module Modal -->
  <div class="modal-overlay" id="module-modal">
    <div class="modal-box">
      <h2 id="module-modal-title">Add Module</h2>
      <div class="form-group"><label>Module Title</label><input id="module-title" placeholder="e.g., Getting Started"/></div>
      <div class="modal-actions">
        <button onclick="closeModuleModal()" class="btn-outline">Cancel</button>
        <button class="btn-primary" onclick="saveModule()">Save</button>
      </div>
    </div>
  </div>

  <!-- Lesson Modal -->
  <div class="modal-overlay" id="lesson-modal">
    <div class="modal-box">
      <h2 id="lesson-modal-title">Add Lesson</h2>
      <div class="form-group"><label>Lesson Title</label><input id="lesson-title" placeholder="e.g., What is HTML?"/></div>
      <div class="form-group"><label>Type</label>
        <select id="lesson-type"><option value="video">Video</option><option value="pdf">PDF</option><option value="quiz">Quiz</option><option value="note">Note</option></select>
      </div>
      <div id="lesson-video-field" class="form-group"><label>Video URL</label><input id="lesson-video" placeholder="YouTube URL or video file URL"/></div>
      <div class="form-group"><label>Duration (minutes)</label><input id="lesson-duration" type="number" min="1" value="10"/></div>
      <div class="modal-actions">
        <button onclick="closeLessonModal()" class="btn-outline">Cancel</button>
        <button class="btn-primary" onclick="saveLesson()">Save</button>
      </div>
    </div>
  </div>

  <!-- Content Block Modal -->
  <div class="modal-overlay" id="content-modal">
    <div class="modal-box">
      <h2 id="content-modal-title">Add Content</h2>
      <div class="form-group"><label>Heading</label><input id="content-heading" placeholder="Section heading"/></div>
      <div class="form-group"><label>Subheading (optional)</label><input id="content-subheading" placeholder="Brief subtitle"/></div>
      <div class="form-group"><label>Content</label><textarea id="content-body" rows="6" placeholder="Write your content here (HTML supported)..."></textarea></div>
      <div class="modal-actions">
        <button onclick="closeContentModal()" class="btn-outline">Cancel</button>
        <button class="btn-primary" onclick="saveContent()">Save</button>
      </div>
    </div>
  </div>

  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/dom.js"></script>
  <script src="/js/components/include.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script>
    if (!Shared.auth.requireAuth()) {}
    var courseId = window.location.pathname.split('/').pop();
    var courseData = null;
    var editingModuleId = null;
    var editingLessonId = null;
    var editingContentLessonId = null;

    document.addEventListener('DOMContentLoaded', function() {
      if (courseId !== 'new') loadCourse();
    });

    function loadCourse() {
      api.get('/builder/courses/' + courseId).then(function(res) {
        if (res.error) { alert('Failed to load course'); return; }
        courseData = res.data;
        document.getElementById('course-title').value = courseData.title || '';
        document.getElementById('course-desc').value = courseData.description || '';
        document.getElementById('course-category').value = courseData.category || '';
        document.getElementById('course-price').value = courseData.price || '';
        document.getElementById('course-perks').value = (courseData.perks || []).join('\n');
        renderModules();
        renderPublishInfo();
      });
    }

    function saveDetails() {
      var title = document.getElementById('course-title').value.trim();
      var desc = document.getElementById('course-desc').value.trim();
      var category = document.getElementById('course-category').value.trim();
      var price = parseFloat(document.getElementById('course-price').value) || 0;
      var perks = document.getElementById('course-perks').value.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
      if (!title) { alert('Title is required'); return; }

      var payload = { title: title, description: desc, category: category, price: price, perks: perks };
      var promise;
      if (courseId === 'new') {
        promise = api.post('/builder/courses', payload).then(function(res) {
          if (res.error) throw new Error(res.error.message);
          courseId = res.data.id;
          courseData = res.data;
          history.replaceState(null, '', '/tutor/courses/builder/' + courseId);
          return res;
        });
      } else {
        promise = api.put('/builder/courses/' + courseId, payload);
      }
      promise.then(function(res) {
        if (res.error) { alert(res.error.message); return; }
        document.getElementById('details-status').textContent = 'Saved!';
        setTimeout(function() { document.getElementById('details-status').textContent = ''; }, 2000);
      }).catch(function(err) { alert('Failed to save: ' + (err.data ? err.data.error.message : err)); });
    }

    function renderModules() {
      if (!courseData) return;
      var el = document.getElementById('modules-container');
      var modules = courseData.sections || courseData.modules || [];
      if (!modules.length) { el.innerHTML = '<div class="empty-state"><p>No modules yet. Add your first module!</p></div>'; return; }
      el.innerHTML = modules.map(function(m, mi) {
        var lessons = m.Lessons || [];
        return '<div class="module-item"><div class="header"><h3>' + (mi + 1) + '. ' + Shared.escapeHtml(m.title) + '</h3>' +
          '<div><button class="btn-sm" onclick="openModuleModal(\'' + m.id + '\',\'' + Shared.escapeHtml(m.title).replace(/'/g,"\\'") + '\')">Edit</button>' +
          ' <button class="btn-sm" onclick="deleteModule(\'' + m.id + '\')" style="color:var(--error)">Delete</button></div></div>' +
          '<div class="lessons">' +
          (lessons.length ? lessons.map(function(l, li) {
            return '<div class="lesson-item"><span class="icon">' + (l.type === 'video' ? '▶' : l.type === 'quiz' ? '?' : l.type === 'pdf' ? '📄' : '📝') + '</span>' +
              '<span class="name">' + Shared.escapeHtml(l.title) + '</span>' +
              '<span class="type">' + (l.type || 'video') + '</span>' +
              '<button class="btn-sm" onclick="openLessonModal(\'' + m.id + '\',\'' + l.id + '\')">✎</button>' +
              '<button class="btn-sm" onclick="openContentModal(\'' + l.id + '\')">Content</button>' +
              '<button class="btn-sm" onclick="deleteLesson(\'' + m.id + '\',\'' + l.id + '\')" style="color:var(--error)">✕</button></div>';
          }).join('') : '<div style="font-size:0.8125rem;color:var(--on-surface-variant);padding:0.5rem 0">No lessons yet</div>') +
          '<button class="btn-sm" onclick="openLessonModal(\'' + m.id + '\')" style="margin-top:0.25rem">+ Add Lesson</button></div></div>';
      }).join('');
    }

    function renderPublishInfo() {
      if (!courseData) return;
      var modules = courseData.sections || courseData.modules || [];
      var lessons = modules.reduce(function(sum, m) { return sum + (m.Lessons || []).length; }, 0);
      document.getElementById('publish-info').innerHTML =
        '<div style="background:var(--surface-container);border-radius:1rem;padding:1.5rem">' +
        '<p><strong>Title:</strong> ' + Shared.escapeHtml(courseData.title || 'Untitled') + '</p>' +
        '<p><strong>Modules:</strong> ' + modules.length + '</p>' +
        '<p><strong>Lessons:</strong> ' + lessons + '</p>' +
        '<p><strong>Price:</strong> ' + (courseData.price > 0 ? Shared.formatCurrency(courseData.price, courseData.currency) : 'Free') + '</p></div>';
    }

    /* Module */
    function openModuleModal(id, title) {
      editingModuleId = id || null;
      document.getElementById('module-modal-title').textContent = id ? 'Edit Module' : 'Add Module';
      document.getElementById('module-title').value = title || '';
      document.getElementById('module-modal').classList.add('open');
    }
    function closeModuleModal() { document.getElementById('module-modal').classList.remove('open'); editingModuleId = null; document.getElementById('module-title').value = ''; }
    function saveModule() {
      var title = document.getElementById('module-title').value.trim();
      if (!title) { alert('Title is required'); return; }
      var promise = editingModuleId
        ? api.put('/builder/modules/' + editingModuleId, { title: title })
        : api.post('/builder/courses/' + courseId + '/modules', { title: title });
      promise.then(function(res) {
        if (res.error) { alert(res.error.message); return; }
        closeModuleModal(); loadCourse();
      });
    }
    function deleteModule(id) { if (!confirm('Delete this module?')) return; api.delete('/builder/modules/' + id).then(loadCourse); }

    /* Lesson */
    var lessonModuleId = null;

    function openLessonModal(moduleId, lessonId) {
      lessonModuleId = moduleId;
      editingLessonId = lessonId || null;
      document.getElementById('lesson-modal-title').textContent = lessonId ? 'Edit Lesson' : 'Add Lesson';
      document.getElementById('lesson-title').value = '';
      document.getElementById('lesson-type').value = 'video';
      document.getElementById('lesson-video').value = '';
      document.getElementById('lesson-duration').value = '10';
      if (lessonId && courseData) {
        var modules = courseData.sections || courseData.modules || [];
        for (var i = 0; i < modules.length; i++) {
          var lessons = modules[i].Lessons || [];
          for (var j = 0; j < lessons.length; j++) {
            if (lessons[j].id === lessonId) {
              document.getElementById('lesson-title').value = lessons[j].title || '';
              document.getElementById('lesson-type').value = lessons[j].type || 'video';
              document.getElementById('lesson-video').value = lessons[j].videoUrl || '';
              document.getElementById('lesson-duration').value = lessons[j].durationMinutes || 10;
              break;
            }
          }
        }
      }
      document.getElementById('lesson-modal').classList.add('open');
    }
    function closeLessonModal() { document.getElementById('lesson-modal').classList.remove('open'); editingLessonId = null; lessonModuleId = null; }
    function saveLesson() {
      var title = document.getElementById('lesson-title').value.trim();
      var type = document.getElementById('lesson-type').value;
      var videoUrl = document.getElementById('lesson-video').value.trim();
      var duration = parseInt(document.getElementById('lesson-duration').value) || 10;
      if (!title) { alert('Title is required'); return; }
      var payload = { title: title, type: type, videoUrl: videoUrl, durationMinutes: duration };
      var promise;
      if (editingLessonId) {
        promise = api.put('/builder/lessons/' + editingLessonId, payload);
      } else {
        promise = api.post('/builder/modules/' + lessonModuleId + '/lessons', payload);
      }
      promise.then(function(res) {
        if (res.error) { alert(res.error.message); return; }
        closeLessonModal(); loadCourse();
      });
    }
    function deleteLesson(moduleId, lessonId) { if (!confirm('Delete this lesson?')) return; api.delete('/builder/lessons/' + lessonId).then(loadCourse); }

    /* Content Blocks */
    function openContentModal(lessonId) {
      editingContentLessonId = lessonId;
      document.getElementById('content-modal-title').textContent = 'Add Content to Lesson';
      document.getElementById('content-heading').value = '';
      document.getElementById('content-subheading').value = '';
      document.getElementById('content-body').value = '';
      document.getElementById('content-modal').classList.add('open');
    }
    function closeContentModal() { document.getElementById('content-modal').classList.remove('open'); editingContentLessonId = null; }
    function saveContent() {
      var heading = document.getElementById('content-heading').value.trim();
      var subheading = document.getElementById('content-subheading').value.trim();
      var content = document.getElementById('content-body').value.trim();
      if (!heading) { alert('Heading is required'); return; }
      api.post('/builder/lessons/' + editingContentLessonId + '/content', { heading: heading, subheading: subheading || null, content: content }).then(function(res) {
        if (res.error) { alert(res.error.message); return; }
        closeContentModal(); loadCourse();
      });
    }

    /* Publish */
    function publishCourse() {
      api.post('/builder/courses/' + courseId + '/publish').then(function(res) {
        if (res.error) { document.getElementById('publish-status').textContent = 'Error: ' + res.error.message; return; }
        document.getElementById('publish-status').textContent = 'Course published!';
        document.getElementById('publish-btn').disabled = true;
      });
    }
    function previewCourse() { window.open('/course/' + courseId, '_blank'); }

    /* Step Navigation */
    function goStep(step) {
      document.querySelectorAll('.step-panel').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById('step-' + step).classList.add('active');
      document.querySelectorAll('.steps button').forEach(function(b, i) { b.classList.remove('active'); });
      document.querySelectorAll('.steps button')[step - 1].classList.add('active');
      if (step === 2 && courseId !== 'new' && courseData) { renderModules(); }
      if (step === 3 && courseId !== 'new' && courseData) { renderPublishInfo(); }
    }

    /* Show/hide video field based on lesson type */
    document.getElementById('lesson-type').addEventListener('change', function() {
      document.getElementById('lesson-video-field').style.display = this.value === 'video' ? 'block' : 'none';
    });
  </script>
</body>
</html>
