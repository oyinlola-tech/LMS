<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Admin Enrollments</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
    .admin-sidebar { width: 260px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .admin-sidebar .brand { font-size: 1.25rem; font-weight: 800; color: var(--on-surface); letter-spacing: -0.02em; }
    .admin-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .admin-nav a .icon { font-size: 1.25rem; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    .toolbar { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .search-wrapper { display: flex; align-items: center; gap: 0.5rem; background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 0.75rem; padding: 0.5rem 0.75rem; flex: 1; min-width: 200px; max-width: 400px; }
    .search-wrapper input { border: none; background: none; outline: none; font-size: 0.875rem; color: var(--on-surface); width: 100%; font-family: inherit; }
    .filter-select { padding: 0.5rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.875rem; font-family: inherit; cursor: pointer; }
    .table-container { background: var(--surface-container); border-radius: 1rem; border: 1px solid var(--outline-variant); overflow: hidden; }
    .table-container table { width: 100%; border-collapse: collapse; }
    .table-container th { text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--on-surface-variant); border-bottom: 1px solid var(--outline-variant); background: var(--surface-container-high); }
    .table-container td { padding: 0.75rem 1rem; font-size: 0.875rem; border-bottom: 1px solid var(--outline-variant); }
    .table-container tr:last-child td { border-bottom: none; }
    .table-container tr:hover td { background: var(--surface-container-low); }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .badge.active { background: #d1fae5; color: #065f46; }
    .badge.completed { background: var(--primary-fixed); color: var(--on-primary-fixed); }
    .badge.dropped { background: var(--error-container); color: var(--on-error-container); }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; padding: 1rem; }
    .pagination button { padding: 0.375rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.5rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.8125rem; cursor: pointer; font-family: inherit; }
    .pagination button:disabled { opacity: 0.5; cursor: default; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--on-surface-variant); }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-chip { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 0.75rem; padding: 0.75rem 1rem; text-align: center; }
    .stat-chip .val { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
    .stat-chip .lbl { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--on-surface-variant); font-weight: 600; }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/admin/components/admin-sidebar"></div>
    <main class="admin-main">
      <div data-include="/admin/components/admin-header"></div>
      <div class="page-header">
        <h1>Enrollments</h1>
      </div>
      <div class="stats-row" id="stats-row">
        <div class="stat-chip"><div class="val" id="stat-total">—</div><div class="lbl">Total</div></div>
        <div class="stat-chip"><div class="val" id="stat-active">—</div><div class="lbl">Active</div></div>
        <div class="stat-chip"><div class="val" id="stat-completed">—</div><div class="lbl">Completed</div></div>
        <div class="stat-chip"><div class="val" id="stat-dropped">—</div><div class="lbl">Dropped</div></div>
      </div>
      <div class="toolbar">
        <div class="search-wrapper">
          <span class="material-symbols-outlined" style="font-size:1.25rem;color:var(--on-surface-variant)">search</span>
          <input type="text" id="search-input" placeholder="Search by student or course..." oninput="loadEnrollments()"/>
        </div>
        <select id="status-filter" class="filter-select" onchange="loadEnrollments()">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="dropped">Dropped</option>
        </select>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Course</th>
              <th>Status</th>
              <th>Progress</th>
              <th>Enrolled</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="enrollments-tbody">
            <tr><td colspan="6" style="text-align:center;color:var(--on-surface-variant);padding:2rem">Loading enrollments...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination">
        <button id="prev-page" onclick="changePage(-1)" disabled>Previous</button>
        <span id="page-info" style="font-size:0.8125rem;color:var(--on-surface-variant)">Page 1</span>
        <button id="next-page" onclick="changePage(1)">Next</button>
      </div>
    </main>
  </div>
  <div data-include="/admin/components/admin-bottom-nav"></div>
  <div data-include="auth-modal"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/admin.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    (function() {
      var token = localStorage.getItem('token');
      if (!token) { window.location.href = '/login'; return; }
      var currentPage = 1, pageSize = 20, totalPages = 1;
      var $ = function(id) { return document.getElementById(id); };
      function loadEnrollments() {
        var search = ($('search-input') || {}).value || '';
        var status = ($('status-filter') || {}).value || '';
        api.get('/admin/enrollments?limit=' + pageSize + '&page=' + currentPage + '&search=' + encodeURIComponent(search) + '&status=' + status)
          .then(function(res) {
            var data = res.data || {};
            var items = data.items || data.enrollments || [];
            totalPages = data.totalPages || data.total ? Math.ceil(data.total / pageSize) : 1;
            var tbody = $('enrollments-tbody');
            if (!items.length) {
              tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><span class="material-symbols-outlined" style="font-size:2.5rem;display:block;margin-bottom:0.5rem">assignment</span><p>No enrollments found</p></div></td></tr>';
            } else {
              tbody.innerHTML = items.map(function(e) {
                var statusBadge = 'badge ' + (e.status || 'active');
                var progress = e.progress || e.completionPercent || 0;
                return '<tr>' +
                  '<td><div style="display:flex;align-items:center;gap:0.5rem"><span style="font-weight:600">' + (e.User?.fullName || e.studentName || '—') + '</span></div></td>' +
                  '<td>' + (e.Course?.title || e.courseTitle || '—') + '</td>' +
                  '<td><span class="' + statusBadge + '">' + (e.status || 'active') + '</span></td>' +
                  '<td><div style="display:flex;align-items:center;gap:0.5rem"><div class="progress-bar" style="flex:1;height:0.5rem;max-width:120px;background:var(--surface-container-high);border-radius:999px;overflow:hidden"><div style="height:100%;width:' + progress + '%;background:var(--primary);border-radius:999px;transition:width 0.3s"></div></div><span style="font-size:0.75rem;color:var(--on-surface-variant)">' + progress + '%</span></div></td>' +
                  '<td style="font-size:0.8125rem;color:var(--on-surface-variant)">' + (e.createdAt ? new Date(e.createdAt).toLocaleDateString() : '—') + '</td>' +
                  '<td><button class="btn-icon" onclick="viewEnrollment(\'' + e.id + '\')" title="View"><span class="material-symbols-outlined">chevron_right</span></button></td>' +
                  '</tr>';
              }).join('');
            }
            $('page-info').textContent = 'Page ' + currentPage + ' of ' + totalPages;
            $('prev-page').disabled = currentPage <= 1;
            $('next-page').disabled = currentPage >= totalPages;
            if (data.totals) {
              $('stat-total').textContent = data.totals.total || data.totals.all || '—';
              $('stat-active').textContent = data.totals.active || '—';
              $('stat-completed').textContent = data.totals.completed || '—';
              $('stat-dropped').textContent = data.totals.dropped || '—';
            }
          })
          .catch(function(err) {
            console.error('Load enrollments error:', err);
            $('enrollments-tbody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--error);padding:2rem">Failed to load enrollments</td></tr>';
          });
      }
      window.loadEnrollments = loadEnrollments;
      window.changePage = function(delta) { currentPage = Math.max(1, Math.min(currentPage + delta, totalPages)); loadEnrollments(); };
      window.viewEnrollment = function(id) { window.location.href = '/courses/' + id; };
      document.addEventListener('components-loaded', loadEnrollments);
    })();
  </script>
</body>
</html>
