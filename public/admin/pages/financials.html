<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Financials</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
    .admin-sidebar { width: 240px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .admin-sidebar .brand { font-size: 1.25rem; font-weight: 800; color: var(--on-surface); }
    .admin-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { padding: 1.25rem; border-radius: 1rem; background: var(--surface-container); }
    .stat-card .label { font-size: 0.75rem; color: var(--on-surface-variant); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .stat-card .value { font-size: 1.75rem; font-weight: 800; margin-top: 0.25rem; }
    .stat-card .sub { font-size: 0.8125rem; color: var(--on-surface-variant); margin-top: 0.25rem; }
    .tabs { display: flex; border-bottom: 1px solid var(--outline-variant); margin-bottom: 1.5rem; }
    .tabs button { padding: 0.75rem 1.25rem; font-size: 0.875rem; font-weight: 600; border: none; background: none; color: var(--on-surface-variant); cursor: pointer; border-bottom: 2px solid transparent; }
    .tabs button.active { color: var(--primary); border-bottom-color: var(--primary); }
    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--outline-variant); }
    th { font-weight: 600; color: var(--on-surface-variant); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.6875rem; font-weight: 600; }
    .badge.pending { background: #fef3c7; color: #92400e; }
    .badge.approved { background: #d1fae5; color: #065f46; }
    .badge.rejected { background: #fee2e2; color: #991b1b; }
    .btn-sm { padding: 0.25rem 0.75rem; border-radius: 0.375rem; border: 1px solid var(--outline); background: var(--surface); cursor: pointer; font-size: 0.75rem; }
    .btn-sm.primary { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
    .btn-sm.danger { background: var(--error); color: #fff; border-color: var(--error); }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/admin/components/admin-sidebar"></div>
    <main class="admin-main">
      <h1 style="font-size:1.5rem;margin:0 0 1.5rem">Financials</h1>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="label">Total Revenue</div><div class="value" id="total-revenue">-</div></div>
        <div class="stat-card"><div class="label">Pending Payouts</div><div class="value" id="pending-payouts">-</div></div>
        <div class="stat-card"><div class="label">Active Tutors</div><div class="value" id="active-tutors">-</div></div>
        <div class="stat-card"><div class="label">Commission Rate</div><div class="value" id="commission-rate">-</div></div>
      </div>
      <div class="tabs">
        <button class="active" onclick="switchTab('overview',this)">Overview</button>
        <button onclick="switchTab('payouts',this)">Payouts</button>
        <button onclick="switchTab('tutors',this)">Tutor Earnings</button>
      </div>
      <div id="tab-overview"><div id="overview-content"><p style="color:var(--on-surface-variant)">Loading...</p></div></div>
      <div id="tab-payouts" style="display:none"><div id="payouts-content"></div></div>
      <div id="tab-tutors" style="display:none"><div id="tutors-content"></div></div>
    </main>
  </div>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/dom.js"></script>
  <script src="/js/components/include.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script>
    if (!Shared.auth.requireAuth()) {}
    document.addEventListener('DOMContentLoaded', function() { loadOverview(); loadPayouts(); loadTutors(); });

    function loadOverview() {
      api.get('/admin/financials/overview').then(function(res) {
        if (res.error) return;
        var d = res.data || {};
        document.getElementById('total-revenue').textContent = d.currency === 'EUR' ? '\u20AC' : '$' + (d.totalRevenue || 0).toLocaleString();
        document.getElementById('pending-payouts').textContent = (d.pendingPayouts || 0).toLocaleString();
        document.getElementById('active-tutors').textContent = d.activeTutors || 0;
        document.getElementById('commission-rate').textContent = (d.commissionPercent || 0) + '%';
      });
    }

    function loadPayouts() {
      api.get('/admin/payouts').then(function(res) {
        var el = document.getElementById('payouts-content');
        if (res.error || !res.data || !res.data.length) { el.innerHTML = '<p style="color:var(--on-surface-variant)">No payouts yet</p>'; return; }
        el.innerHTML = '<table><thead><tr><th>Tutor</th><th>Amount</th><th>Status</th><th>Date</th><th>Action</th></tr></thead><tbody>' +
          res.data.map(function(p) {
            return '<tr><td>' + Shared.escapeHtml(p.tutorName || p.UserId || '-') + '</td><td>$' + (p.amount || 0).toFixed(2) + '</td>' +
              '<td><span class="badge ' + (p.status || 'pending') + '">' + (p.status || 'pending') + '</span></td>' +
              '<td>' + Shared.formatTime(p.createdAt) + '</td>' +
              '<td>' + (p.status === 'pending' ? '<button class="btn-sm primary" onclick="approvePayout(\'' + p.id + '\')">Approve</button> <button class="btn-sm danger" onclick="rejectPayout(\'' + p.id + '\')">Reject</button>' : '-') + '</td></tr>';
          }).join('') + '</tbody></table>';
      });
    }

    function loadTutors() {
      api.get('/admin/financials/tutors').then(function(res) {
        var el = document.getElementById('tutors-content');
        if (res.error || !res.data || !res.data.length) { el.innerHTML = '<p style="color:var(--on-surface-variant)">No tutor data yet</p>'; return; }
        el.innerHTML = '<table><thead><tr><th>Tutor</th><th>Earnings</th><th>Courses</th><th>Students</th></tr></thead><tbody>' +
          res.data.map(function(t) {
            return '<tr><td>' + Shared.escapeHtml(t.name || t.email || '-') + '</td><td>$' + (t.earnings || 0).toFixed(2) + '</td>' +
              '<td>' + (t.courseCount || 0) + '</td><td>' + (t.studentCount || 0) + '</td></tr>';
          }).join('') + '</tbody></table>';
      });
    }

    function approvePayout(id) { api.patch('/admin/payouts/' + id, { status: 'approved' }).then(function() { loadPayouts(); }); }
    function rejectPayout(id) { api.patch('/admin/payouts/' + id, { status: 'rejected' }).then(function() { loadPayouts(); }); }

    function switchTab(tab, btn) {
      document.querySelectorAll('.tabs button').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      ['overview','payouts','tutors'].forEach(function(t) { document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none'; });
    }
  </script>
</body>
</html>
