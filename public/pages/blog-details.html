<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Blog</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
</head>
<body>
  <div data-include="blog-details-header"></div>
  <main style="padding-top: 6rem">
    <div class="container" style="max-width: 48rem; padding: 2rem 1.5rem 4rem">
      <div id="post-content">
        <div class="p-8 text-center" style="color: var(--on-surface-variant)">Loading post...</div>
      </div>
    </div>
  </main>
  <div data-include="blog-details-footer"></div>
<script src="/js/components/include.js"></script>
  <script src="/js/components/auth-ui.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/apis/blog.js"></script>
  <script>
    document.addEventListener('components-loaded', async () => {
      var slug = window.location.pathname.replace('/blog/', '');
      var el = document.getElementById('post-content');
      try {
        var result = await BlogAPI.getBySlug(slug);
        var post = result.data;
        if (!post) { el.innerHTML = '<div class="p-8 text-center" style="color: var(--error)">Post not found.</div>'; return; }
        var date = post.publishedAt ? new Date(post.publishedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
        var name = post.author ? post.author.fullName || 'LearnBridge' : 'LearnBridge';
        document.title = post.title + ' - LearnBridge Blog';
        el.innerHTML = '<article>' +
          '<h1 class="text-3xl font-black mb-4">' + escapeHtml(post.title) + '</h1>' +
          '<div class="flex items-center gap-3 mb-8 text-sm" style="color: var(--on-surface-variant)">' +
            '<span>' + date + '</span>' +
            '<span class="px-2 py-0.5 rounded-full text-xs font-semibold" style="background: var(--primary-fixed); color: var(--on-primary-fixed)">' + (post.category || 'general') + '</span>' +
            '<span>By ' + escapeHtml(name) + '</span>' +
          '</div>' +
          '<div class="prose max-w-none" style="line-height: 1.8; font-size: 1.0625rem">' + (post.content || '') + '</div>' +
          '<div class="mt-12 pt-8" style="border-top: 1px solid var(--outline-variant)">' +
            '<a href="/blog" class="text-sm font-bold hover:text-primary transition-colors" style="color: var(--on-surface-variant)">&larr; Back to Blog</a>' +
          '</div>' +
        '</article>';
      } catch (err) {
        el.innerHTML = '<div class="p-8 text-center" style="color: var(--error)">Failed to load post.</div>';
      }
    });
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
