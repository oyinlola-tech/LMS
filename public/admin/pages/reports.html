<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Reports</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
    .admin-sidebar { width: 260px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .admin-sidebar .brand { font-size: 1.25rem; font-weight: 800; color: var(--on-surface); letter-spacing: -0.02em; }
    .admin-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; font-weight: 500; }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .admin-nav a .icon { font-size: 1.25rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--outline-variant); }
    th { font-weight: 600; color: var(--on-surface-variant); font-size: 0.75rem; text-transform: uppercase; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.6875rem; font-weight: 600; }
    .badge.open { background: #dbeafe; color: #1e40af; }
    .badge.resolved { background: #d1fae5; color: #065f46; }
    .badge.dismissed { background: #f3f4f6; color: #374151; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--surface-container); border-radius: 1rem; padding: 2rem; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    .modal-box h2 { margin: 0 0 1rem; }
    .msg-item { padding: 0.75rem; border-radius: 0.5rem; background: var(--surface); margin-bottom: 0.5rem; }
    .msg-item .meta { font-size: 0.75rem; color: var(--on-surface-variant); }
    .msg-item p { margin: 0.25rem 0 0; font-size: 0.875rem; }
    .btn-sm { padding: 0.375rem 0.75rem; border-radius: 0.375rem; border: none; cursor: pointer; font-size: 0.8125rem; }
    .btn-primary { background: var(--primary); color: #fff; }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/admin/components/admin-sidebar"></div>
    <main class="admin-main">
      <div data-include="/admin/components/admin-header"></div>
      <h1 style="font-size:1.5rem;margin:0 0 1.5rem">Reports</h1>
      <table><thead><tr><th>Reporter</th><th>Reported</th><th>Reason</th><th>Status</th><th>Updated</th></tr></thead>
        <tbody id="reports-body"><tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--on-surface-variant)">Loading...</td></tr></tbody>
      </table>
    </main>
  </div>
  <div class="modal-overlay" id="report-modal">
    <div class="modal-box">
      <h2 id="report-title">Report</h2>
      <div id="report-details"></div>
      <div id="report-messages"></div>
      <div style="margin-top:1rem;display:flex;gap:0.75rem;align-items:center">
        <select id="action-select" class="btn-sm" style="padding:0.375rem 0.75rem;border-radius:0.375rem;border:1px solid var(--outline);font-size:0.8125rem">
          <option value="warn">Issue Warning</option>
          <option value="dismiss">Dismiss</option>
        </select>
        <input id="reason-input" type="text" placeholder="Reason (for warning)" style="padding:0.375rem 0.75rem;border-radius:0.375rem;border:1px solid var(--outline);font-size:0.8125rem;flex:1"/>
        <button onclick="resolveReport()" class="btn-sm btn-primary">Submit</button>
        <button onclick="closeModal()" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:1.25rem">✕</button>
      </div>
    </div>
  </div>
  <div data-include="/admin/components/admin-bottom-nav"></div>
  <div data-include="auth-modal"></div>
  <div id="toast" class="toast"></div>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/dom.js"></script>
  <script src="/js/components/include.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    if (!Shared.auth.requireAuth()) {}
    var currentReportId = null;
    document.addEventListener('components-loaded', loadReports);

    function loadReports() {
      api.get('/admin/reports?limit=50').then(function(res) {
        var tbody = document.getElementById('reports-body');
        if (res.error || !res.data || !res.data.items || !res.data.items.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--on-surface-variant)">No reports</td></tr>';
          return;
        }
        tbody.innerHTML = res.data.items.map(function(r) {
          return '<tr class="ticket-item" onclick="openReport(\'' + r.id + '\')"><td>' + Shared.escapeHtml(r.reporter?.fullName || '-') + '</td>' +
            '<td>' + Shared.escapeHtml(r.reported?.fullName || '-') + '</td>' +
            '<td>' + Shared.escapeHtml(r.reason || '-') + '</td>' +
            '<td><span class="badge ' + (r.status || 'open') + '">' + (r.status || 'open') + '</span></td>' +
            '<td>' + Shared.formatTime(r.updatedAt || r.createdAt) + '</td></tr>';
        }).join('');
      }).catch(function() {});
    }

    function openReport(id) {
      currentReportId = id;
      document.getElementById('report-modal').classList.add('open');
      api.get('/admin/reports/' + id).then(function(res) {
        if (res.error) return;
        var r = res.data;
        document.getElementById('report-title').textContent = 'Report: ' + (r.reason || 'User Report');
        var details = '<p><strong>Reporter:</strong> ' + Shared.escapeHtml(r.reporter?.fullName || '-') + '</p>' +
          '<p><strong>Reported:</strong> ' + Shared.escapeHtml(r.reported?.fullName || '-') + '</p>' +
          '<p><strong>Status:</strong> ' + (r.status || 'open') + '</p>';
        document.getElementById('report-details').innerHTML = details;
        var msgs = r.lastMessages || [];
        document.getElementById('report-messages').innerHTML = msgs.length ? msgs.map(function(m) {
          return '<div class="msg-item"><div class="meta">' + Shared.formatTime(m.createdAt) + '</div><p>' + Shared.escapeHtml(m.body || '') + '</p></div>';
        }).join('') : '<p style="color:var(--on-surface-variant)">No messages attached</p>';
      });
    }

    function resolveReport() {
      if (!currentReportId) return;
      var action = document.getElementById('action-select').value;
      var reason = document.getElementById('reason-input').value;
      api.post('/admin/reports/' + currentReportId + '/resolve', { action: action, reason: reason }).then(function() {
        loadReports();
        closeModal();
      }).catch(function() { alert('Failed to resolve report'); });
    }

    function closeModal() { document.getElementById('report-modal').classList.remove('open'); currentReportId = null; }
  </script>
</body>
</html>
