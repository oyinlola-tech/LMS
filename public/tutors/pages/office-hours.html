<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Office Hours</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .layout { display: flex; min-height: 100vh; }
    .main { flex: 1; padding: 2rem; max-width: 800px; margin: 0 auto; width: 100%; }
    .tutor-sidebar { width: 240px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .tutor-sidebar .brand { font-size: 1.25rem; font-weight: 800; }
    .tutor-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; }
    .tutor-nav a:hover, .tutor-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    .sub { color: var(--on-surface-variant); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8125rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--on-surface-variant); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.625rem 0.75rem; border-radius: 0.5rem; border: 1px solid var(--outline); background: var(--surface); font-family: inherit; font-size: 0.875rem; box-sizing: border-box; }
    .btn-primary { padding: 0.625rem 1.25rem; border-radius: 0.5rem; border: none; background: var(--primary); color: var(--on-primary); font-weight: 600; cursor: pointer; }
    .sessions-list { margin-top: 2rem; }
    .session-item { padding: 1rem; border-radius: 0.75rem; background: var(--surface-container); margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .session-item .info h3 { margin: 0; font-size: 0.9375rem; }
    .session-item .info p { margin: 0.125rem 0 0; font-size: 0.8125rem; color: var(--on-surface-variant); }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--on-surface-variant); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    @media (max-width: 768px) { .tutor-sidebar { display: none; } .main { padding: 1rem; } }
  </style>
</head>
<body>
  <div class="layout">
    <div data-include="/tutors/components/tutor-sidebar"></div>
    <main class="main">
      <h1>Office Hours</h1>
      <p class="sub">Schedule when students can book time with you</p>
      <div style="background:var(--surface-container);border-radius:1rem;padding:1.5rem;margin-bottom:2rem">
        <h2 style="font-size:1.125rem;margin:0 0 1rem">Schedule a Session</h2>
        <div class="form-group"><label>Title</label><input id="oh-title" placeholder="e.g., Weekly Q&A"/></div>
        <div class="form-group"><label>Date & Time</label><input id="oh-datetime" type="datetime-local"/></div>
        <div class="form-group"><label>Duration (minutes)</label><input id="oh-duration" type="number" value="30" min="15" max="120"/></div>
        <div class="form-group"><label>Description (optional)</label><textarea id="oh-desc" rows="2" placeholder="What topics will you cover?"></textarea></div>
        <button class="btn-primary" onclick="scheduleSession()">Schedule</button>
      </div>
      <div class="sessions-list" id="sessions-list"><p style="color:var(--on-surface-variant)">Loading...</p></div>
    </main>
  </div>
  <script src="/js/shared/api.js"></script>
  <script src="/js/shared/auth.js"></script>
  <script src="/js/shared/dom.js"></script>
  <script src="/js/components/include.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script>
    if (!Shared.auth.requireAuth()) {}
    document.addEventListener('DOMContentLoaded', loadSessions);

    function loadSessions() {
      api.get('/tutors/office-hours').then(function(res) {
        var el = document.getElementById('sessions-list');
        if (res.error || !res.data || !res.data.length) { el.innerHTML = '<div class="empty-state"><div class="icon">📅</div><p>No office hours scheduled yet</p></div>'; return; }
        el.innerHTML = '<h2 style="font-size:1.125rem;margin:0 0 1rem">Upcoming Sessions</h2>';
        res.data.forEach(function(s) {
          el.innerHTML += '<div class="session-item"><div class="info"><h3>' + Shared.escapeHtml(s.title || 'Office Hours') + '</h3>' +
            '<p>' + Shared.formatTime(s.startTime || s.dateTime) + ' &middot; ' + (s.durationMinutes || 30) + ' min' +
            (s.description ? ' &middot; ' + Shared.escapeHtml(s.description) : '') + '</p></div></div>';
        });
      });
    }

    function scheduleSession() {
      var title = document.getElementById('oh-title').value.trim();
      var dateTime = document.getElementById('oh-datetime').value;
      var duration = parseInt(document.getElementById('oh-duration').value) || 30;
      var desc = document.getElementById('oh-desc').value.trim();
      if (!title) { alert('Title is required'); return; }
      if (!dateTime) { alert('Date & time is required'); return; }
      api.post('/tutors/actions/schedule-office-hour', { title: title, dateTime: new Date(dateTime).toISOString(), durationMinutes: duration, description: desc }).then(function(res) {
        if (res.error) { alert(res.error.message); return; }
        document.getElementById('oh-title').value = '';
        document.getElementById('oh-datetime').value = '';
        document.getElementById('oh-desc').value = '';
        loadSessions();
      });
    }
  </script>
</body>
</html>
