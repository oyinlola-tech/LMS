services:
  postgres:
    image: postgres:16
    container_name: learnbridge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-learnbridge}
    ports:
      - "5432:5432"
    volumes:
      - learnbridge-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-learnbridge}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: learnbridge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - learnbridge-redis-data:/data

volumes:
  learnbridge-db-data:
  learnbridge-redis-data:
