<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Set Up Your Profile</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <link href="/students/profile/css/setup.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" rel="stylesheet"/>
</head>
<body>
  <div class="setup-page">
    <div class="setup-container">
      <div class="setup-header">
        <img src="/img/logo.svg" alt="LearnBridge" height="28" style="height:28px"/>
        <h1>Complete Your Profile</h1>
        <p>Help us personalize your learning experience</p>
      </div>

      <div class="setup-steps">
        <div class="ss-step active" data-step="1"><span class="ss-circle">1</span><span class="ss-label">Photo & Name</span></div>
        <div class="ss-line"></div>
        <div class="ss-step" data-step="2"><span class="ss-circle">2</span><span class="ss-label">Bio & Interests</span></div>
        <div class="ss-line"></div>
        <div class="ss-step" data-step="3"><span class="ss-circle">3</span><span class="ss-label">Skills & Details</span></div>
      </div>

      <!-- Step 1 -->
      <div class="setup-step" id="setup-step-1">
        <div class="photo-upload-area" id="photo-upload-area">
          <div class="photo-preview" id="photo-preview">
            <span class="material-symbols-outlined photo-icon">add_a_photo</span>
          </div>
          <p class="photo-hint">Upload a profile photo</p>
          <input type="file" id="photo-input" accept="image/*" style="display:none"/>
        </div>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="f-setup-name" class="form-input" placeholder="Your full name" maxlength="120"/>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="setup-step" id="setup-step-2" style="display:none">
        <div class="form-group">
          <label class="form-label">Bio</label>
          <textarea id="f-setup-bio" class="form-input form-textarea" placeholder="Tell us a little about yourself..." rows="3" maxlength="500"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">What are you interested in?</label>
          <div class="interests-grid" id="interests-grid">
            <label class="interest-chip" data-value="web-development"><input type="checkbox" style="display:none"/> Web Development</label>
            <label class="interest-chip" data-value="mobile-development"><input type="checkbox" style="display:none"/> Mobile Development</label>
            <label class="interest-chip" data-value="data-science"><input type="checkbox" style="display:none"/> Data Science</label>
            <label class="interest-chip" data-value="machine-learning"><input type="checkbox" style="display:none"/> Machine Learning</label>
            <label class="interest-chip" data-value="cloud-computing"><input type="checkbox" style="display:none"/> Cloud Computing</label>
            <label class="interest-chip" data-value="cybersecurity"><input type="checkbox" style="display:none"/> Cybersecurity</label>
            <label class="interest-chip" data-value="devops"><input type="checkbox" style="display:none"/> DevOps</label>
            <label class="interest-chip" data-value="ui-ux"><input type="checkbox" style="display:none"/> UI/UX Design</label>
            <label class="interest-chip" data-value="blockchain"><input type="checkbox" style="display:none"/> Blockchain</label>
            <label class="interest-chip" data-value="game-dev"><input type="checkbox" style="display:none"/> Game Development</label>
            <label class="interest-chip" data-value="database"><input type="checkbox" style="display:none"/> Database Management</label>
            <label class="interest-chip" data-value="ai"><input type="checkbox" style="display:none"/> Artificial Intelligence</label>
            <label class="interest-chip" data-value="networking"><input type="checkbox" style="display:none"/> Networking</label>
            <label class="interest-chip" data-value="software-engineering"><input type="checkbox" style="display:none"/> Software Engineering</label>
            <label class="interest-chip" data-value="testing"><input type="checkbox" style="display:none"/> Software Testing</label>
          </div>
        </div>
      </div>

      <!-- Step 3 -->
      <div class="setup-step" id="setup-step-3" style="display:none">
        <div class="form-group">
          <label class="form-label">Skills (comma separated)</label>
          <input type="text" id="f-setup-skills" class="form-input" placeholder="e.g. JavaScript, Python, React, SQL"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" id="f-setup-phone" class="form-input" placeholder="+1 (555) 000-0000"/>
          </div>
          <div class="form-group">
            <label class="form-label">Location</label>
            <input type="text" id="f-setup-location" class="form-input" placeholder="e.g. New York, USA"/>
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="setup-actions">
        <button type="button" class="btn btn-outline" id="setup-skip-btn">Skip for now</button>
        <div class="setup-actions-right">
          <button type="button" class="btn btn-outline" id="setup-prev-btn" style="display:none">Back</button>
          <button type="button" class="btn btn-primary" id="setup-next-btn">Next</button>
          <button type="button" class="btn btn-success" id="setup-finish-btn" style="display:none"><span class="material-symbols-outlined">check</span> Complete Profile</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/students/profile/js/setup.js"></script>
</body>
</html>
