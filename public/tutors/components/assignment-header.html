<header class="admin-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem">
  <div style="display:flex;align-items:center;gap:1rem">
    <img src="/img/logo.svg" alt="LearnBridge" height="24" style="height:24px"/>
    <span style="width:1px;height:24px;background:var(--outline-variant)"></span>
    <h1 style="font-size:1.5rem;font-weight:700;margin:0">Assignments</h1>
  </div>
  <div class="user-info" style="display:flex;align-items:center;gap:0.75rem;font-size:0.875rem;color:var(--on-surface-variant)">
    <span id="user-name" style="font-weight:600">Tutor</span>
    <a href="/profile" style="text-decoration:none;display:flex">
      <div id="header-avatar" class="dash-avatar" style="background-image:url(/img/placeholder.svg);width:2.25rem;height:2.25rem;border-radius:50%;background-size:cover;background-position:center;border:2px solid var(--outline-variant)"></div>
    </a>
    <button id="logout-btn" class="dash-icon-btn" type="button" title="Logout" style="background:none;border:none;color:var(--on-surface-variant);cursor:pointer;width:2rem;height:2rem;border-radius:0.5rem;display:flex;align-items:center;justify-content:center;transition:var(--transition)"><span class="material-symbols-outlined">logout</span></button>
  </div>
</header>
