<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - My Portfolio</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 1.5rem; overflow-y: auto; max-width: 800px; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    .page-header p { font-size: 0.875rem; color: var(--on-surface-variant); margin-top: 0.125rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.8125rem; font-weight: 600; margin-bottom: 0.375rem; color: var(--on-surface-variant); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.625rem 0.875rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; font-size: 0.875rem; outline: none; font-family: inherit; background: var(--surface-container); }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .array-item { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    .array-item input { flex: 1; }
    .btn-remove-item { background: none; border: none; color: var(--error); cursor: pointer; padding: 0.25rem; font-size: 1.25rem; }
    .btn-add-item { background: none; border: 1px dashed var(--outline-variant); padding: 0.5rem; border-radius: 0.75rem; cursor: pointer; color: var(--primary); font-size: 0.8125rem; font-weight: 600; width: 100%; }
    .btn-save { padding: 0.75rem 2rem; background: var(--primary); color: #fff; border: none; border-radius: 0.75rem; font-size: 0.9375rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-view { display: inline-block; padding: 0.5rem 1rem; background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 0.75rem; text-decoration: none; color: var(--on-surface); font-size: 0.8125rem; font-weight: 600; margin-left: 0.5rem; }
    .section-card { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; }
    .section-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .checkbox-row input[type="checkbox"] { width: auto; }
    .saved-msg { color: var(--primary); font-size: 0.875rem; font-weight: 600; display: none; margin-left: 0.5rem; }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/students/components/dashboard-sidebar"></div>
    <main class="admin-main">
      <div data-include="/students/components/dashboard-header"></div>
      <div class="page-header">
        <h1>My Portfolio</h1>
        <p>Showcase your skills, certifications, and completed courses</p>
      </div>
      <div class="section-card">
        <h3><span class="material-symbols-outlined" style="font-size:1.25rem">person</span> Basic Info</h3>
        <div class="form-group">
          <label>Headline (e.g. "Full Stack Developer")</label>
          <input type="text" id="headline" placeholder="What do you do?"/>
        </div>
        <div class="form-group">
          <label>Bio</label>
          <textarea id="bio" rows="3" placeholder="Tell your story..."></textarea>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="isPublic" checked/>
          <label for="isPublic" style="margin:0;cursor:pointer">Make portfolio public</label>
        </div>
      </div>
      <div class="section-card">
        <h3><span class="material-symbols-outlined" style="font-size:1.25rem">psychology</span> Skills</h3>
        <div id="skills-container"></div>
        <button class="btn-add-item" onclick="addSkill()">+ Add Skill</button>
      </div>
      <div class="section-card">
        <h3><span class="material-symbols-outlined" style="font-size:1.25rem">verified</span> Certifications</h3>
        <div id="certifications-container"></div>
        <button class="btn-add-item" onclick="addCertification()">+ Add Certification</button>
      </div>
      <div class="section-card">
        <h3><span class="material-symbols-outlined" style="font-size:1.25rem">work</span> Experience</h3>
        <div id="experience-container"></div>
        <button class="btn-add-item" onclick="addExperience()">+ Add Experience</button>
      </div>
      <div class="section-card">
        <h3><span class="material-symbols-outlined" style="font-size:1.25rem">school</span> Education</h3>
        <div id="education-container"></div>
        <button class="btn-add-item" onclick="addEducation()">+ Add Education</button>
      </div>
      <div class="section-card">
        <h3><span class="material-symbols-outlined" style="font-size:1.25rem">link</span> Social Links</h3>
        <div class="form-row">
          <div class="form-group"><label>GitHub</label><input type="url" id="link-github" placeholder="https://github.com/..."/></div>
          <div class="form-group"><label>LinkedIn</label><input type="url" id="link-linkedin" placeholder="https://linkedin.com/in/..."/></div>
          <div class="form-group"><label>Twitter</label><input type="url" id="link-twitter" placeholder="https://twitter.com/..."/></div>
          <div class="form-group"><label>Website</label><input type="url" id="link-website" placeholder="https://..."/></div>
        </div>
      </div>
      <button class="btn-save" id="save-btn" onclick="savePortfolio()">Save Portfolio</button>
      <a id="view-portfolio-link" class="btn-view" target="_blank" style="display:none">View Public Portfolio</a>
      <span class="saved-msg" id="saved-msg">Saved!</span>
    </main>
  </div>
  <div data-include="/students/components/dashboard-bottom-nav"></div>
  <div data-include="auth-modal"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/shared/dom.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script>
    (function() {
      if (!localStorage.getItem('token')) { window.location.href = '/login'; return; }
      var userId = null;
      try { userId = JSON.parse(atob(localStorage.getItem('token').split('.')[1])).sub; } catch(e) {}

      function createArrayItem(value, prefix, fields) {
        var div = document.createElement('div');
        div.className = 'array-item';
        var html = '';
        if (fields) {
          fields.forEach(function(f) {
            html += '<input type="text" placeholder="' + f.placeholder + '" value="' + ((value && value[f.key]) ? value[f.key] : '') + '" data-field="' + f.key + '" style="' + (f.style || '') + '"/>';
          });
        } else {
          html += '<input type="text" placeholder="Enter value" value="' + (value || '') + '"/>';
        }
        html += '<button class="btn-remove-item material-symbols-outlined" onclick="this.parentElement.remove()">close</button>';
        div.innerHTML = html;
        return div;
      }

      window.addSkill = function() { document.getElementById('skills-container').appendChild(createArrayItem('', null)); };
      window.addCertification = function() {
        document.getElementById('certifications-container').appendChild(createArrayItem({ name: '', issuer: '', year: '' }, null, [
          { key: 'name', placeholder: 'Certification Name' },
          { key: 'issuer', placeholder: 'Issuer', style: 'flex:0.7' },
          { key: 'year', placeholder: 'Year', style: 'width:80px' },
        ]));
      };
      window.addExperience = function() {
        document.getElementById('experience-container').appendChild(createArrayItem({ role: '', company: '', duration: '', description: '' }, null, [
          { key: 'role', placeholder: 'Role' },
          { key: 'company', placeholder: 'Company', style: 'flex:0.7' },
          { key: 'duration', placeholder: 'Duration', style: 'width:100px' },
        ]));
      };
      window.addEducation = function() {
        document.getElementById('education-container').appendChild(createArrayItem({ degree: '', school: '', graduationYear: '' }, null, [
          { key: 'degree', placeholder: 'Degree' },
          { key: 'school', placeholder: 'School', style: 'flex:0.7' },
          { key: 'graduationYear', placeholder: 'Year', style: 'width:80px' },
        ]));
      };

      function collectArray(containerId, isObject) {
        var items = [];
        document.querySelectorAll('#' + containerId + ' .array-item').forEach(function(item) {
          if (isObject) {
            var obj = {};
            item.querySelectorAll('input[data-field]').forEach(function(inp) { obj[inp.getAttribute('data-field')] = inp.value; });
            items.push(obj);
          } else {
            var val = item.querySelector('input');
            if (val && val.value.trim()) items.push(val.value.trim());
          }
        });
        return items;
      }

      function savePortfolio() {
        var btn = document.getElementById('save-btn');
        btn.disabled = true;
        var data = {
          headline: document.getElementById('headline').value,
          bio: document.getElementById('bio').value,
          isPublic: document.getElementById('isPublic').checked,
          skills: collectArray('skills-container', false),
          certifications: collectArray('certifications-container', true),
          experience: collectArray('experience-container', true),
          education: collectArray('education-container', true),
          socialLinks: {
            github: document.getElementById('link-github').value || undefined,
            linkedin: document.getElementById('link-linkedin').value || undefined,
            twitter: document.getElementById('link-twitter').value || undefined,
            website: document.getElementById('link-website').value || undefined,
          },
        };
        api.put('/portfolio/me', data).then(function() {
          btn.disabled = false;
          document.getElementById('saved-msg').style.display = 'inline';
          setTimeout(function() { document.getElementById('saved-msg').style.display = 'none'; }, 2000);
        }).catch(function(err) {
          btn.disabled = false;
          alert('Failed to save: ' + ((err && err.error && err.error.message) || 'Unknown error'));
        });
      }

      function loadPortfolio() {
        api.get('/portfolio/me').then(function(r) {
          var p = r.data || {};
          document.getElementById('headline').value = p.headline || '';
          document.getElementById('bio').value = p.bio || '';
          document.getElementById('isPublic').checked = p.isPublic !== false;

          if (p.skills) { var s = typeof p.skills === 'string' ? JSON.parse(p.skills) : p.skills; s.forEach(function(v) { var el = createArrayItem(v, null); document.getElementById('skills-container').appendChild(el); }); }
          if (p.certifications) { var c = typeof p.certifications === 'string' ? JSON.parse(p.certifications) : p.certifications; c.forEach(function(v) { document.getElementById('certifications-container').appendChild(createArrayItem(v, null, [{key:'name',placeholder:'Certification Name'},{key:'issuer',placeholder:'Issuer',style:'flex:0.7'},{key:'year',placeholder:'Year',style:'width:80px'}])); }); }
          if (p.experience) { var e = typeof p.experience === 'string' ? JSON.parse(p.experience) : p.experience; e.forEach(function(v) { document.getElementById('experience-container').appendChild(createArrayItem(v, null, [{key:'role',placeholder:'Role'},{key:'company',placeholder:'Company',style:'flex:0.7'},{key:'duration',placeholder:'Duration',style:'width:100px'}])); }); }
          if (p.education) { var ed = typeof p.education === 'string' ? JSON.parse(p.education) : p.education; ed.forEach(function(v) { document.getElementById('education-container').appendChild(createArrayItem(v, null, [{key:'degree',placeholder:'Degree'},{key:'school',placeholder:'School',style:'flex:0.7'},{key:'graduationYear',placeholder:'Year',style:'width:80px'}])); }); }
          if (p.socialLinks) { var l = typeof p.socialLinks === 'string' ? JSON.parse(p.socialLinks) : p.socialLinks; if (l.github) document.getElementById('link-github').value = l.github; if (l.linkedin) document.getElementById('link-linkedin').value = l.linkedin; if (l.twitter) document.getElementById('link-twitter').value = l.twitter; if (l.website) document.getElementById('link-website').value = l.website; }

          if (userId) { var link = document.getElementById('view-portfolio-link'); link.href = '/portfolio?userId=' + userId; link.style.display = 'inline-block'; link.textContent = 'View Public Portfolio'; }
        }).catch(function() {});
      }

      document.addEventListener('components-loaded', loadPortfolio);
      window.savePortfolio = savePortfolio;
    })();
  </script>
</body>
</html>
