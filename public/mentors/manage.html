<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Mentorship Applications</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; border-bottom: 1px solid var(--outline-variant); background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); padding: 0.75rem 1rem; }
    .header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .header-links { display: flex; align-items: center; gap: 1.5rem; }
    .header-links a { font-size: 0.875rem; font-weight: 500; color: var(--on-surface-variant); text-decoration: none; }
    .header-links a:hover { color: var(--primary); }
    main { margin-top: 4rem; }
    .container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 3rem; }
    .hero { padding: 3rem 1.5rem 2rem; text-align: center; }
    .hero h1 { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
    .hero p { font-size: 1rem; color: var(--on-surface-variant); }
    .course-selector { max-width: 400px; margin: 0 auto 2rem; }
    .course-selector select { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; background: var(--surface-container); color: var(--on-surface); font-size: 0.875rem; font-family: inherit; cursor: pointer; }
    .course-selector select:focus { outline: none; border-color: var(--primary); }
    .app-card { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; }
    .app-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
    .app-avatar { width: 3rem; height: 3rem; border-radius: 50%; background: var(--surface-container-high); display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; color: var(--primary); overflow: hidden; flex-shrink: 0; }
    .app-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .app-user h3 { font-size: 1rem; font-weight: 700; margin: 0 0 0.125rem; }
    .app-user .email { font-size: 0.8125rem; color: var(--on-surface-variant); }
    .app-message { font-size: 0.875rem; color: var(--on-surface); line-height: 1.5; margin-bottom: 0.75rem; padding: 0.75rem; background: var(--surface); border-radius: 0.75rem; }
    .app-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .app-meta .tag { padding: 0.25rem 0.5rem; border-radius: 0.375rem; font-size: 0.75rem; background: var(--surface-variant); color: var(--on-surface-variant); }
    .app-meta .tag a { color: var(--primary); text-decoration: none; }
    .app-meta .tag a:hover { text-decoration: underline; }
    .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; text-transform: capitalize; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-approved { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }
    .app-actions { display: flex; gap: 0.5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--outline-variant); }
    .btn-approve { padding: 0.5rem 1.25rem; border: none; border-radius: 0.75rem; font-size: 0.8125rem; font-weight: 600; cursor: pointer; font-family: inherit; background: #059669; color: #fff; transition: background 0.15s; }
    .btn-approve:hover { background: #047857; }
    .btn-reject { padding: 0.5rem 1.25rem; border: none; border-radius: 0.75rem; font-size: 0.8125rem; font-weight: 600; cursor: pointer; font-family: inherit; background: var(--error); color: #fff; transition: background 0.15s; }
    .btn-reject:hover { background: #b91c1c; }
    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--on-surface-variant); }
    .empty-state .icon { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
    .loading { text-align: center; padding: 3rem 1rem; color: var(--on-surface-variant); }
    footer { border-top: 1px solid var(--outline-variant); padding: 2rem 1.5rem; text-align: center; font-size: 0.8125rem; color: var(--on-surface-variant); margin-top: 3rem; }
    @media (max-width: 768px) { .hero h1 { font-size: 1.5rem; } .app-header { flex-wrap: wrap; } }
  </style>
</head>
<body>
  <header class="fixed-header">
    <div class="header-inner">
      <a href="/" style="font-size:1.25rem;font-weight:800;text-decoration:none;color:var(--on-surface)">LearnBridge</a>
      <nav class="header-links">
        <a href="/courses">Courses</a>
        <a href="/blog">Blog</a>
        <a href="/mentors">Mentors</a>
        <a href="/about">About</a>
        <a href="/login" class="btn-primary" style="padding:0.5rem 1rem;font-size:0.8125rem;text-decoration:none">Sign In</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="hero">
      <h1>Mentorship Applications</h1>
      <p>Review and manage mentorship requests</p>
    </div>
    <div class="container">
      <div class="course-selector">
        <select id="course-select" onchange="onCourseChange()">
          <option value="">Select a course...</option>
        </select>
      </div>
      <div id="applications-list">
        <div class="empty-state"><span class="icon">🎓</span><p>Select a course to view mentorship applications</p></div>
      </div>
    </div>
  </main>
  <footer>&copy; 2026 LearnBridge. All rights reserved.</footer>
  <div data-include="auth-modal"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script>
    (function() {
      var $ = function(id) { return document.getElementById(id); };

      function escapeHtml(str) {
        var d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      function formatTime(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        var now = new Date();
        var opts = { hour: 'numeric', minute: '2-digit' };
        if (d.toDateString() !== now.toDateString()) {
          opts.month = 'short';
          opts.day = 'numeric';
        }
        return d.toLocaleTimeString('en-US', opts);
      }

      function getInitials(name) {
        return (name || '?').split(' ').map(function(s) { return s[0]; }).join('').substring(0, 2).toUpperCase();
      }

      function loadCourses() {
        api.get('/builder/courses').then(function(res) {
          var select = $('course-select');
          var courses = res.data || [];
          select.innerHTML = '<option value="">Select a course...</option>' + courses.map(function(c) {
            return '<option value="' + c.id + '">' + escapeHtml(c.title) + '</option>';
          }).join('');
        }).catch(function(err) {
          console.error('Failed to load courses', err);
          $('course-select').innerHTML = '<option value="">Failed to load courses</option>';
        });
      }

      window.onCourseChange = function() {
        var select = $('course-select');
        var courseId = select.value;
        var list = $('applications-list');
        if (!courseId) {
          list.innerHTML = '<div class="empty-state"><span class="icon">🎓</span><p>Select a course to view mentorship applications</p></div>';
          return;
        }
        list.innerHTML = '<div class="loading"><p>Loading applications...</p></div>';
        api.get('/mentorship/applications/' + courseId).then(function(res) {
          var apps = res.data || [];
          if (!apps.length) {
            list.innerHTML = '<div class="empty-state"><span class="icon">search_off</span><p>No mentorship applications for this course</p></div>';
            return;
          }
          list.innerHTML = apps.map(function(a) {
            var user = a.User || {};
            var name = user.fullName || 'Unknown';
            var email = user.email || '';
            var avatar = user.avatarUrl || '';
            var initials = getInitials(name);
            var message = a.message || '';
            var portfolio = a.portfolioUrl || '';
            var cert = a.certificationRequirements || '';
            var status = a.status || 'pending';
            var statusClass = 'status-' + status;
            var pendingActions = status === 'pending'
              ? '<button class="btn-approve" onclick="approve(\'' + a.id + '\')">Approve</button><button class="btn-reject" onclick="reject(\'' + a.id + '\')">Reject</button>'
              : '';
            var metaHtml = '';
            if (portfolio) {
              metaHtml += '<span class="tag"><a href="' + escapeHtml(portfolio) + '" target="_blank" rel="noopener">Portfolio</a></span>';
            }
            if (cert) {
              metaHtml += '<span class="tag">' + escapeHtml(cert) + '</span>';
            }
            metaHtml += '<span class="tag">Applied ' + formatTime(a.createdAt) + '</span>';
            return '<div class="app-card">'
              + '<div class="app-header">'
              + '<div class="app-avatar">' + (avatar ? '<img src="' + avatar + '" alt=""/>' : '<span>' + initials + '</span>') + '</div>'
              + '<div class="app-user"><h3>' + escapeHtml(name) + '</h3><div class="email">' + escapeHtml(email) + '</div></div>'
              + '<div style="margin-left:auto"><span class="status-badge ' + statusClass + '">' + status + '</span></div>'
              + '</div>'
              + (message ? '<div class="app-message">' + escapeHtml(message) + '</div>' : '')
              + (metaHtml ? '<div class="app-meta">' + metaHtml + '</div>' : '')
              + (pendingActions ? '<div class="app-actions">' + pendingActions + '</div>' : '')
              + '</div>';
          }).join('');
        }).catch(function(err) {
          console.error(err);
          list.innerHTML = '<div class="empty-state" style="color:var(--error)"><span class="icon">error</span><p>Failed to load applications</p></div>';
        });
      };

      window.approve = function(id) {
        api.post('/mentorship/' + id + '/approve').then(function() {
          onCourseChange();
        }).catch(function(err) {
          console.error(err);
          alert('Failed to approve application');
        });
      };

      window.reject = function(id) {
        api.post('/mentorship/' + id + '/reject').then(function() {
          onCourseChange();
        }).catch(function(err) {
          console.error(err);
          alert('Failed to reject application');
        });
      };

      document.addEventListener('components-loaded', loadCourses);
    })();
  </script>
</body>
</html>
