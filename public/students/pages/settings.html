<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LearnBridge - Settings</title>
  <link href="/css/styles.css" rel="stylesheet"/>
  <link href="/css/modal.css" rel="stylesheet"/>
  <style>
    body { background: var(--surface); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-main { flex: 1; padding: 1.5rem; overflow-y: auto; }
    .admin-sidebar { width: 240px; background: var(--surface-container); border-right: 1px solid var(--outline-variant); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
    .admin-sidebar .brand { font-size: 1.25rem; font-weight: 800; color: var(--on-surface); }
    .admin-nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .admin-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: var(--on-surface-variant); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
    .admin-nav a:hover, .admin-nav a.active { background: var(--primary-container); color: var(--on-primary-container); }
    .admin-nav a .icon { font-size: 1.25rem; }
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    .settings-card { background: var(--surface-container); border: 1px solid var(--outline-variant); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.25rem; }
    .settings-card h2 { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.25rem; }
    .settings-card .desc { font-size: 0.8125rem; color: var(--on-surface-variant); margin-bottom: 1.25rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8125rem; font-weight: 600; margin-bottom: 0.375rem; color: var(--on-surface); }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid var(--outline-variant); border-radius: 0.75rem; background: var(--surface-container-lowest); color: var(--on-surface); font-size: 0.875rem; font-family: inherit; outline: none; }
    .form-group input:focus { border-color: var(--primary); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .avatar-section { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .avatar-preview { width: 4rem; height: 4rem; border-radius: 50%; background: var(--surface-container-high); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; color: var(--primary); overflow: hidden; }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    .danger-zone { border-color: var(--error-container) !important; }
    .danger-zone h2 { color: var(--error); }
    .btn-danger { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; background: var(--error); color: #fff; font-size: 0.8125rem; font-weight: 700; border: none; border-radius: 0.75rem; cursor: pointer; font-family: inherit; }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { padding: 1rem; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <div data-include="/students/components/dashboard-sidebar"></div>
    <main class="admin-main">
      <div data-include="/students/components/dashboard-header"></div>
      <div class="page-header">
        <h1>Settings</h1>
      </div>
      <div class="settings-card">
        <h2>Profile</h2>
        <p class="desc">Update your personal information</p>
        <div class="avatar-section">
          <div class="avatar-preview" id="avatar-preview"><span id="avatar-initials">?</span></div>
          <button class="btn-secondary" onclick="document.getElementById('avatar-upload').click()" style="font-size:0.8125rem;padding:0.5rem 1rem">Change Photo</button>
          <input type="file" id="avatar-upload" accept="image/*" style="display:none"/>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" id="full-name" placeholder="Your name"/></div>
          <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" disabled style="opacity:0.6"/></div>
        </div>
        <button class="btn-primary" onclick="saveProfile()" style="padding:0.625rem 1.25rem;font-size:0.8125rem">Save Changes</button>
      </div>
      <div class="settings-card">
        <h2>Password</h2>
        <p class="desc">Change your password</p>
        <div class="form-group"><label>Current Password</label><input type="password" id="current-pw"/></div>
        <div class="form-row">
          <div class="form-group"><label>New Password</label><input type="password" id="new-pw"/></div>
          <div class="form-group"><label>Confirm Password</label><input type="password" id="confirm-pw"/></div>
        </div>
        <button class="btn-primary" onclick="changePassword()" style="padding:0.625rem 1.25rem;font-size:0.8125rem">Update Password</button>
      </div>
      <div class="settings-card">
        <h2>Notifications</h2>
        <p class="desc">Manage your notification preferences</p>
        <div style="display:flex;flex-direction:column;gap:0.75rem">
          <label style="display:flex;align-items:center;gap:0.75rem;font-size:0.875rem;cursor:pointer"><input type="checkbox" checked/> Email notifications</label>
          <label style="display:flex;align-items:center;gap:0.75rem;font-size:0.875rem;cursor:pointer"><input type="checkbox" checked/> Course announcements</label>
          <label style="display:flex;align-items:center;gap:0.75rem;font-size:0.875rem;cursor:pointer"><input type="checkbox"/> Assignment reminders</label>
          <label style="display:flex;align-items:center;gap:0.75rem;font-size:0.875rem;cursor:pointer"><input type="checkbox" checked/> Weekly digest</label>
        </div>
      </div>
      <div class="settings-card danger-zone">
        <h2>Danger Zone</h2>
        <p class="desc">Irreversible account actions</p>
        <button class="btn-danger" onclick="if(confirm('Are you sure you want to deactivate your account?'))alert('Account deactivated')"><span class="material-symbols-outlined">person_off</span> Deactivate Account</button>
      </div>
    </main>
  </div>
  <div data-include="/students/components/dashboard-bottom-nav"></div>
  <div data-include="auth-modal"></div>
  <script src="/js/components/include.js"></script>
  <script src="/js/apis/api.js"></script>
  <script src="/js/apis/auth.js"></script>
  <script src="/js/components/auth-modal.js"></script>
  <script src="/js/components/active-page.js"></script>
  <script>
    (function() {
      if (!localStorage.getItem('token')) { window.location.href = '/login'; return; }
      var $ = function(id) { return document.getElementById(id); };
      function loadProfile() {
        api.get('/user/profile').then(function(r) {
          var u = r.data || r.user || r;
          $('full-name').value = u.fullName || '';
          $('email').value = u.email || '';
          var initials = (u.fullName||'?').split(' ').map(function(s){return s[0];}).join('').substring(0,2).toUpperCase();
          $('avatar-initials').textContent = initials;
        }).catch(function(e) { console.error(e); });
      }
      window.saveProfile = function() {
        var name = $('full-name').value.trim();
        if (!name) return;
        api.put('/user/profile', {fullName: name}).then(function() { alert('Profile updated'); }).catch(function(e) { console.error(e); });
      };
      window.changePassword = function() {
        var current = $('current-pw').value;
        var newpw = $('new-pw').value;
        var confirm = $('confirm-pw').value;
        if (!current || !newpw) return;
        if (newpw !== confirm) { alert('Passwords do not match'); return; }
        api.put('/user/password', {currentPassword: current, newPassword: newpw}).then(function() { alert('Password updated'); $('current-pw').value=''; $('new-pw').value=''; $('confirm-pw').value=''; }).catch(function(e) { console.error(e); });
      };
      document.addEventListener('components-loaded', loadProfile);
    })();
  </script>
</body>
</html>
